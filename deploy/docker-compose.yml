# LegacyGraph 应用部署 Docker Compose 配置
# 仅包含前后端应用代码；PostgreSQL、Neo4j、Redis、MinIO 均使用外部服务器
# 外部服务连接信息通过 .env 文件或环境变量注入（参见同目录 .env）

services:
  # 后端 Spring Boot 应用
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: legacygraph-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # ---- 外部 PostgreSQL ----
      SPRING_DATASOURCE_URL: ${POSTGRES_URL:?需在 .env 配置外部 PostgreSQL 地址，如 jdbc:postgresql://db.example.com:5432/legacy_graph}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME:?需在 .env 配置 PostgreSQL 用户名}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?需在 .env 配置 PostgreSQL 密码}
      # ---- 外部 Neo4j ----
      SPRING_NEO4J_URI: ${NEO4J_URI:?需在 .env 配置外部 Neo4j 地址，如 bolt://graph.example.com:7687}
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${NEO4J_USERNAME:?需在 .env 配置 Neo4j 用户名}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD:?需在 .env 配置 Neo4j 密码}
      # ---- 外部 Redis ----
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:?需在 .env 配置外部 Redis 主机}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # ---- 外部 MinIO / S3 ----
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:?需在 .env 配置外部 MinIO 地址，如 http://oss.example.com:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?需在 .env 配置 MinIO Access Key}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?需在 .env 配置 MinIO Secret Key}
      # ---- LLM（可选）----
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    networks:
      - legacygraph-network
    restart: unless-stopped

  # 前端 Nginx 静态服务
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: legacygraph-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - legacygraph-network
    restart: unless-stopped

networks:
  legacygraph-network:
    driver: bridge
