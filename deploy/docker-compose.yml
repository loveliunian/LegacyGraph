# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
# LegacyGraph 应用部署 Docker Compose 配置
# 仅包含前后端应用代码；PostgreSQL、Neo4j、Redis、MinIO 均使用外部服务器
# 外部服务连接信息通过 .env 文件或环境变量注入（参见同目录 .env）

services:
  # 后端 Spring Boot 应用
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: legacygraph-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # ---- 外部 PostgreSQL ----
      SPRING_DATASOURCE_URL: ${POSTGRES_URL:?需在 .env 配置外部 PostgreSQL 地址，如 jdbc:postgresql://db.example.com:5432/legacy_graph}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME:?需在 .env 配置 PostgreSQL 用户名}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?需在 .env 配置 PostgreSQL 密码}
      # ---- 外部 Neo4j ----
      SPRING_NEO4J_URI: ${NEO4J_URI:?需在 .env 配置外部 Neo4j 地址，如 bolt://graph.example.com:7687}
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${NEO4J_USERNAME:?需在 .env 配置 Neo4j 用户名}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD:?需在 .env 配置 Neo4j 密码}
      # ---- 外部 Redis ----
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:?需在 .env 配置外部 Redis 主机}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # ---- 外部 MinIO / S3 ----
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:?需在 .env 配置外部 MinIO 地址，如 http://oss.example.com:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?需在 .env 配置 MinIO Access Key}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?需在 .env 配置 MinIO Secret Key}
      # ---- LLM（可选）----
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - legacygraph-network
    restart: unless-stopped

  # 前端 Nginx 静态部署
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: legacygraph-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - legacygraph-network
    restart: unless-stopped

  # === 观测栈 ===
  prometheus:
    image: prom/prometheus:latest
    container_name: lg-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - legacygraph-network

  grafana:
    image: grafana/grafana:latest
    container_name: lg-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - legacygraph-network

networks:
  legacygraph-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
