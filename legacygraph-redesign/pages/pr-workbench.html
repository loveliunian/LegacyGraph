<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR 工作台 - LegacyGraph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --space-4: 16px; --space-5: 20px; --space-6: 24px;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  --c-primary: #6366F1; --c-primary-light: #9293F4; --c-primary-bg: #EFF0FE;
  --c-success: #14B8A6; --c-success-bg: #E8F8F6;
  --c-warning: #F59E0B; --c-warning-bg: #FCF5EA;
  --c-danger: #EF4444; --c-danger-bg: #FCE1E1;
  --c-info: #909399; --c-info-bg: #EFEFF1;
  --el-text-color-primary: #1D1D1F; --el-text-color-regular: #424245; --el-text-color-secondary: #6E6E73; --el-text-color-placeholder: #A1A1A6;
  --el-border-color: #D1D1D6; --el-border-color-light: #E5E5EA; --el-border-color-lighter: #EDEDF0;
  --el-fill-color: #F5F5F7; --el-fill-color-light: #FAFAFA;
  --el-bg-color: #ffffff; --el-bg-color-page: #F5F5F7; --el-bg-color-overlay: #ffffff;
}
html.dark {
  --c-primary: #818CF8; --c-primary-bg: #0D0E19;
  --c-success: #2DD4BF; --c-warning: #FBBF24; --c-danger: #F87171; --c-info: #9CA3AF;
  --el-text-color-primary: #F5F5F7; --el-text-color-regular: #D1D1D6; --el-text-color-secondary: #8E8E93; --el-text-color-placeholder: #636366;
  --el-border-color: #48484A; --el-border-color-light: #38383A; --el-border-color-lighter: #2C2C2E;
  --el-fill-color: #2C2C2E; --el-bg-color: #1C1C1E; --el-bg-color-page: #000000; --el-bg-color-overlay: #2C2C2E;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--el-text-color-primary);
  background: var(--el-bg-color-page);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.page-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--space-6);
}
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--el-text-color-secondary);
  margin-bottom: var(--space-5);
}
.breadcrumb svg { width: 14px; height: 14px; color: var(--el-text-color-placeholder); }
.breadcrumb span { color: var(--el-text-color-primary); font-weight: 500; }
.page-header {
  margin-bottom: var(--space-4);
}
.page-header h1 {
  font-family: var(--font-body);
  font-size: 22px;
  font-weight: 700;
  color: var(--el-text-color-primary);
}
.page-subtitle {
  font-size: 14px;
  color: var(--el-text-color-secondary);
  margin-top: 4px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.4;
}
.btn-primary {
  background: var(--c-primary);
  color: #fff;
}
.btn-primary:hover { opacity: 0.85; }
.btn-default {
  background: var(--el-bg-color);
  color: var(--el-text-color-regular);
  border: 1px solid var(--el-border-color);
}
.btn-default:hover { border-color: var(--c-primary); color: var(--c-primary); }
.btn svg { width: 16px; height: 16px; }
.pr-selector {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: var(--space-5);
  background: var(--el-bg-color);
  border-radius: var(--radius-md);
  border: 1px solid var(--el-border-color-lighter);
  margin-bottom: var(--space-6);
}
.pr-selector input {
  flex: 1;
  height: 40px;
  padding: 0 12px;
  border: 1px solid var(--el-border-color);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--el-text-color-primary);
  background: var(--el-bg-color);
  outline: none;
  transition: border-color 0.2s;
}
.pr-selector input:focus { border-color: var(--c-primary); }
.pr-selector input::placeholder { color: var(--el-text-color-placeholder); }
.card {
  background: var(--el-bg-color);
  border-radius: var(--radius-lg);
  border: 1px solid var(--el-border-color-lighter);
  padding: var(--space-6);
}
.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: var(--space-5);
  padding-bottom: var(--space-5);
  border-bottom: 1px solid var(--el-border-color-lighter);
}
.pr-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--el-text-color-primary);
}
.pr-number {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--c-primary);
  margin-left: 8px;
}
.pr-meta {
  display: flex;
  align-items: center;
  gap: var(--space-5);
  margin-top: 8px;
  font-size: 13px;
  color: var(--el-text-color-secondary);
}
.pr-meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.branch-name {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--el-fill-color);
  padding: 2px 8px;
  border-radius: 4px;
  color: var(--el-text-color-regular);
}
.branch-arrow {
  color: var(--el-text-color-placeholder);
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-4);
  margin-bottom: var(--space-6);
}
.stat-card {
  background: var(--el-fill-color-light);
  border-radius: var(--radius-md);
  padding: var(--space-5);
  text-align: center;
}
.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--el-text-color-primary);
}
.stat-label {
  font-size: 13px;
  color: var(--el-text-color-secondary);
  margin-top: 4px;
}
.stat-card.warning .stat-value { color: var(--c-warning); }
.section-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--el-text-color-primary);
  margin-bottom: var(--space-4);
}
.module-list {
  display: flex;
  gap: var(--space-4);
  flex-wrap: wrap;
  margin-bottom: var(--space-5);
}
.module-tag {
  display: inline-flex;
  align-items: center;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--el-border-color);
  color: var(--el-text-color-regular);
  background: var(--el-bg-color);
}
.module-tag.highlighted {
  background: var(--c-primary-bg);
  border-color: var(--c-primary);
  color: var(--c-primary);
}
.code-summary {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  padding: var(--space-4) var(--space-5);
  background: var(--el-fill-color-light);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-6);
  font-size: 14px;
  color: var(--el-text-color-regular);
}
.code-add {
  color: var(--c-success);
  font-weight: 600;
  font-family: var(--font-mono);
}
.code-remove {
  color: var(--c-danger);
  font-weight: 600;
  font-family: var(--font-mono);
}
.card-actions {
  display: flex;
  gap: var(--space-4);
  padding-top: var(--space-5);
  border-top: 1px solid var(--el-border-color-lighter);
}
.dark-toggle {
  position: fixed;
  top: 16px;
  right: 16px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--el-border-color);
  background: var(--el-bg-color);
  color: var(--el-text-color-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: all 0.2s;
}
.dark-toggle:hover { border-color: var(--c-primary); color: var(--c-primary); }
.dark-toggle svg { width: 18px; height: 18px; }
.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
}
.tag-warning { background: var(--c-warning-bg); color: var(--c-warning); }
</style>
</head>
<body>

<button class="dark-toggle" onclick="document.documentElement.classList.toggle('dark')" title="切换暗色模式">
  <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<div class="page-container">
  <div class="breadcrumb">
    <span>项目管理</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    <span>电商平台重构</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    <span style="color:var(--el-text-color-primary);font-weight:500">PR 工作台</span>
  </div>

  <div class="page-header">
    <h1>PR 工作台</h1>
    <p class="page-subtitle">分析 Pull Request 对知识图谱的影响</p>
  </div>

  <div class="pr-selector">
    <input type="text" placeholder="输入 PR URL 或编号，例如 #123" value="#123" />
    <button class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      分析
    </button>
  </div>

  <div class="card">
    <div class="card-header">
      <div>
        <div class="pr-title">fix: 修改订单状态机逻辑 <span class="pr-number">#123</span></div>
        <div class="pr-meta">
          <span class="pr-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            张三
          </span>
          <span class="pr-meta-item">
            <span class="branch-name">feature/order-state</span>
            <span class="branch-arrow">&rarr;</span>
            <span class="branch-name">main</span>
          </span>
        </div>
      </div>
      <span class="tag tag-warning">风险等级: 中</span>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">3</div>
        <div class="stat-label">影响模块</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">12</div>
        <div class="stat-label">影响节点</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">8</div>
        <div class="stat-label">影响边</div>
      </div>
      <div class="stat-card warning">
        <div class="stat-value">中</div>
        <div class="stat-label">风险等级</div>
      </div>
    </div>

    <div class="section-title">受影响模块</div>
    <div class="module-list">
      <span class="module-tag highlighted">订单服务</span>
      <span class="module-tag">支付服务</span>
      <span class="module-tag">库存服务</span>
    </div>

    <div class="section-title">代码变更摘要</div>
    <div class="code-summary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      <span><span class="code-add">+45</span> <span class="code-remove">-23</span> 行，涉及 3 个文件</span>
    </div>

    <div class="card-actions">
      <button class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="2"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        查看影响图谱
      </button>
      <button class="btn btn-default">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        生成报告
      </button>
    </div>
  </div>
</div>

<script>
  const sun = document.getElementById('icon-sun');
  const moon = document.getElementById('icon-moon');
  const observer = new MutationObserver(() => {
    const isDark = document.documentElement.classList.contains('dark');
    sun.style.display = isDark ? 'none' : 'block';
    moon.style.display = isDark ? 'block' : 'none';
  });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
</script>
</body>
</html>
