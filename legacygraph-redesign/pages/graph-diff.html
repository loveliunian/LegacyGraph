<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图谱对比 - LegacyGraph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --space-4: 16px; --space-5: 20px; --space-6: 24px;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  --c-primary: #6366F1; --c-primary-light: #9293F4; --c-primary-bg: #EFF0FE;
  --c-success: #14B8A6; --c-success-bg: #E8F8F6;
  --c-warning: #F59E0B; --c-warning-bg: #FCF5EA;
  --c-danger: #EF4444; --c-danger-bg: #FCE1E1;
  --c-info: #909399; --c-info-bg: #EFEFF1;
  --gradient-icon-code: linear-gradient(135deg, #6366F1, #818CF8);
  --gradient-icon-db: linear-gradient(135deg, #14B8A6, #2DD4BF);
  --gradient-icon-doc: linear-gradient(135deg, #F59E0B, #FBBF24);
  --gradient-icon-graph: linear-gradient(135deg, #8B5CF6, #A78BFA);
  --el-text-color-primary: #1D1D1F; --el-text-color-regular: #424245; --el-text-color-secondary: #6E6E73; --el-text-color-placeholder: #A1A1A6;
  --el-border-color: #D1D1D6; --el-border-color-light: #E5E5EA; --el-border-color-lighter: #EDEDF0;
  --el-fill-color: #F5F5F7; --el-fill-color-light: #FAFAFA;
  --el-bg-color: #ffffff; --el-bg-color-page: #F5F5F7; --el-bg-color-overlay: #ffffff;
  --diff-add: #14B8A6; --diff-add-bg: #E8F8F6;
  --diff-remove: #EF4444; --diff-remove-bg: #FCE1E1;
  --diff-modify: #F59E0B; --diff-modify-bg: #FCF5EA;
}
html.dark {
  --c-primary: #818CF8; --c-primary-bg: #0D0E19;
  --c-success: #2DD4BF; --c-warning: #FBBF24; --c-danger: #F87171; --c-info: #9CA3AF;
  --el-text-color-primary: #F5F5F7; --el-text-color-regular: #D1D1D6; --el-text-color-secondary: #8E8E93; --el-text-color-placeholder: #636366;
  --el-border-color: #48484A; --el-border-color-light: #38383A; --el-border-color-lighter: #2C2C2E;
  --el-fill-color: #2C2C2E; --el-bg-color: #1C1C1E; --el-bg-color-page: #000000; --el-bg-color-overlay: #2C2C2E;
  --diff-add-bg: #051513; --diff-remove-bg: #2A1010; --diff-modify-bg: #2A2008;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: var(--font-body); color: var(--el-text-color-primary); background: var(--el-bg-color-page); }
.page-wrapper { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--el-bg-color); border-bottom: 1px solid var(--el-border-color-light);
  padding: 12px 24px; flex-shrink: 0;
}
.top-bar-left { display: flex; align-items: center; gap: 12px; }
.breadcrumb { font-size: 12px; color: var(--el-text-color-placeholder); font-family: var(--font-mono); white-space: nowrap; }
.breadcrumb span { color: var(--el-text-color-secondary); }
.top-bar-title-group { display: flex; flex-direction: column; gap: 2px; }
.top-bar-title { font-family: var(--font-display); font-size: 20px; font-weight: 400; color: var(--el-text-color-primary); line-height: 1.2; }
.top-bar-subtitle { font-size: 12px; color: var(--el-text-color-secondary); line-height: 1; }
.top-bar-right { display: flex; align-items: center; gap: 8px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 6px 12px; font-size: 13px; font-family: var(--font-body); font-weight: 500;
  border: 1px solid var(--el-border-color); border-radius: var(--radius-sm);
  background: var(--el-bg-color); color: var(--el-text-color-regular);
  cursor: pointer; transition: all 0.15s ease; white-space: nowrap; line-height: 1.4;
}
.btn:hover { border-color: var(--c-primary); color: var(--c-primary); }
.btn svg { width: 16px; height: 16px; }
.version-select {
  padding: 6px 28px 6px 10px; font-size: 13px; font-family: var(--font-mono); font-weight: 500;
  border: 1px solid var(--el-border-color); border-radius: var(--radius-sm);
  background: var(--el-bg-color); color: var(--el-text-color-regular);
  cursor: pointer; appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236E6E73' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 8px center;
}
.version-select:hover { border-color: var(--c-primary); }

/* Diff layout */
.diff-content {
  flex: 1;
  display: flex;
  overflow: hidden;
}
.diff-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
}
.diff-panel + .diff-panel {
  border-left: 1px solid var(--el-border-color-light);
}
.diff-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--el-bg-color);
  border-bottom: 1px solid var(--el-border-color-lighter);
  flex-shrink: 0;
}
.diff-panel-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--el-text-color-primary);
}
.diff-panel-version {
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--el-text-color-secondary);
  background: var(--el-fill-color);
  padding: 2px 8px;
  border-radius: 4px;
}
.diff-panel-canvas {
  flex: 1;
  background: var(--el-fill-color-light);
  overflow: hidden;
}
.diff-panel-canvas svg { width: 100%; height: 100%; display: block; }

/* Center diff stats */
.diff-stats-center {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 30;
  background: var(--el-bg-color);
  border: 1px solid var(--el-border-color-light);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  min-width: 200px;
}
html.dark .diff-stats-center {
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.2);
}
.diff-stats-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--el-text-color-primary);
  margin-bottom: 12px;
  text-align: center;
}
.diff-stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 4px 0;
}
.diff-stat-row + .diff-stat-row { border-top: 1px solid var(--el-border-color-lighter); }
.diff-stat-label {
  font-size: 12px;
  color: var(--el-text-color-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.diff-stat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.diff-stat-dot.add { background: var(--diff-add); }
.diff-stat-dot.remove { background: var(--diff-remove); }
.diff-stat-dot.modify { background: var(--diff-modify); }
.diff-stat-value {
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-mono);
}

/* Bottom legend */
.diff-legend {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 8px 16px;
  background: var(--el-bg-color);
  border-top: 1px solid var(--el-border-color-lighter);
  flex-shrink: 0;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--el-text-color-secondary);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
}
.legend-dot.add { background: var(--diff-add); }
.legend-dot.remove { background: var(--diff-remove); }
.legend-dot.modify { background: var(--diff-modify); }
.legend-dot.unchanged { background: var(--el-border-color); }

.graph-svg-node circle { cursor: pointer; }
.graph-svg-node text { pointer-events: none; user-select: none; }

.dark-toggle { position: fixed; top: 12px; right: 12px; z-index: 100; }
</style>
</head>
<body>
<div class="page-wrapper">
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="breadcrumb">项目管理 <span>/</span> 电商平台重构 <span>/</span> 图谱对比</span>
      <div class="top-bar-title-group">
        <h2 class="top-bar-title">图谱对比</h2>
        <span class="top-bar-subtitle">对比两个版本的图谱差异</span>
      </div>
    </div>
    <div class="top-bar-right">
      <select class="version-select" id="base-version">
        <option>v2.0.0</option><option>v1.9.2</option><option>v1.8.0</option>
      </select>
      <span style="font-size:13px;color:var(--el-text-color-secondary)">vs</span>
      <select class="version-select" id="compare-version">
        <option>v2.1.0</option><option>v2.0.3</option><option>v2.0.0</option>
      </select>
      <button class="btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5"/><path d="M13.5 2.5v4h-4"/></svg>
        刷新
      </button>
      <button class="btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8"/><path d="M4.5 7.5L8 11l3.5-3.5"/><path d="M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg>
        导出
      </button>
    </div>
  </div>

  <div class="diff-content">
    <!-- Left Panel: Base version -->
    <div class="diff-panel">
      <div class="diff-panel-header">
        <span class="diff-panel-title">基准版本</span>
        <span class="diff-panel-version">v2.0.0</span>
      </div>
      <div class="diff-panel-canvas">
        <svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrowhead-l" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
              <polygon points="0 0, 6 2.5, 0 5" fill="var(--el-border-color)" opacity="0.4"/>
            </marker>
          </defs>
          <pattern id="grid-l" width="30" height="30" patternUnits="userSpaceOnUse">
            <circle cx="15" cy="15" r="0.6" fill="var(--el-border-color-lighter)" opacity="0.5"/>
          </pattern>
          <rect width="600" height="500" fill="url(#grid-l)"/>

          <!-- Edges -->
          <path d="M180 180 Q250 140 320 160" fill="none" stroke="var(--el-border-color)" stroke-width="1.5" opacity="0.3" marker-end="url(#arrowhead-l)"/>
          <path d="M180 220 Q220 290 260 310" fill="none" stroke="var(--el-border-color)" stroke-width="1.5" opacity="0.3" marker-end="url(#arrowhead-l)"/>
          <path d="M360 190 Q400 260 420 290" fill="none" stroke="var(--el-border-color)" stroke-width="1.5" opacity="0.3" marker-end="url(#arrowhead-l)"/>
          <path d="M290 340 Q340 380 380 390" fill="none" stroke="var(--el-border-color)" stroke-width="1.5" opacity="0.3" marker-end="url(#arrowhead-l)"/>

          <!-- Nodes (baseline, some removed in v2.1.0) -->
          <g class="graph-svg-node">
            <circle cx="160" cy="200" r="34" fill="#6366F1" opacity="0.7"/>
            <text x="160" y="196" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">订单</text>
            <text x="160" y="210" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">服务</text>
          </g>
          <g class="graph-svg-node">
            <circle cx="340" cy="170" r="34" fill="#14B8A6" opacity="0.7"/>
            <text x="340" y="166" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">支付</text>
            <text x="340" y="180" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">服务</text>
          </g>
          <g class="graph-svg-node">
            <circle cx="260" cy="330" r="34" fill="#F59E0B" opacity="0.7"/>
            <text x="260" y="326" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">用户</text>
            <text x="260" y="340" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">服务</text>
          </g>
          <g class="graph-svg-node">
            <circle cx="440" cy="310" r="34" fill="#8B5CF6" opacity="0.7"/>
            <text x="440" y="306" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">库存</text>
            <text x="440" y="320" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">服务</text>
          </g>
          <g class="graph-svg-node">
            <circle cx="420" cy="410" r="28" fill="#EC4899" opacity="0.5"/>
            <text x="420" y="406" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="var(--font-body)">商品</text>
            <text x="420" y="418" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="var(--font-body)">服务</text>
          </g>
          <!-- Removed node (shown as faded) -->
          <g class="graph-svg-node" opacity="0.35">
            <circle cx="120" cy="380" r="24" fill="var(--diff-remove)" stroke="var(--diff-remove)" stroke-width="2" stroke-dasharray="4 3"/>
            <text x="120" y="384" text-anchor="middle" fill="var(--diff-remove)" font-size="10" font-weight="500" font-family="var(--font-mono)">日志</text>
          </g>
        </svg>
      </div>
    </div>

    <!-- Right Panel: Compare version -->
    <div class="diff-panel">
      <div class="diff-panel-header">
        <span class="diff-panel-title">对比版本</span>
        <span class="diff-panel-version">v2.1.0</span>
      </div>
      <div class="diff-panel-canvas">
        <svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrowhead-r" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
              <polygon points="0 0, 6 2.5, 0 5" fill="var(--el-border-color)" opacity="0.4"/>
            </marker>
          </defs>
          <pattern id="grid-r" width="30" height="30" patternUnits="userSpaceOnUse">
            <circle cx="15" cy="15" r="0.6" fill="var(--el-border-color-lighter)" opacity="0.5"/>
          </pattern>
          <rect width="600" height="500" fill="url(#grid-r)"/>

          <!-- Edges -->
          <path d="M180 180 Q250 140 320 160" fill="none" stroke="var(--el-border-color)" stroke-width="1.5" opacity="0.3" marker-end="url(#arrowhead-r)"/>
          <path d="M180 220 Q220 290 260 310" fill="none" stroke="var(--el-border-color)" stroke-width="1.5" opacity="0.3" marker-end="url(#arrowhead-r)"/>
          <path d="M360 190 Q400 260 420 290" fill="none" stroke="var(--el-border-color)" stroke-width="1.5" opacity="0.3" marker-end="url(#arrowhead-r)"/>
          <path d="M290 340 Q340 380 380 390" fill="none" stroke="var(--el-border-color)" stroke-width="1.5" opacity="0.3" marker-end="url(#arrowhead-r)"/>
          <!-- New edges -->
          <path d="M480 310 Q500 380 500 400" fill="none" stroke="var(--diff-add)" stroke-width="1.5" opacity="0.4" marker-end="url(#arrowhead-r)"/>

          <!-- Existing nodes (some modified) -->
          <g class="graph-svg-node">
            <circle cx="160" cy="200" r="34" fill="#6366F1" opacity="0.7" stroke="var(--diff-modify)" stroke-width="2"/>
            <text x="160" y="196" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">订单</text>
            <text x="160" y="210" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">服务</text>
          </g>
          <g class="graph-svg-node">
            <circle cx="340" cy="170" r="34" fill="#14B8A6" opacity="0.7"/>
            <text x="340" y="166" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">支付</text>
            <text x="340" y="180" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">服务</text>
          </g>
          <g class="graph-svg-node">
            <circle cx="260" cy="330" r="34" fill="#F59E0B" opacity="0.7"/>
            <text x="260" y="326" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">用户</text>
            <text x="260" y="340" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">服务</text>
          </g>
          <g class="graph-svg-node">
            <circle cx="440" cy="310" r="34" fill="#8B5CF6" opacity="0.7" stroke="var(--diff-modify)" stroke-width="2"/>
            <text x="440" y="306" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">库存</text>
            <text x="440" y="320" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="var(--font-body)">服务</text>
          </g>
          <g class="graph-svg-node">
            <circle cx="420" cy="410" r="28" fill="#EC4899" opacity="0.5"/>
            <text x="420" y="406" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="var(--font-body)">商品</text>
            <text x="420" y="418" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="var(--font-body)">服务</text>
          </g>
          <!-- New nodes (green) -->
          <g class="graph-svg-node">
            <circle cx="500" cy="420" r="26" fill="var(--diff-add)" opacity="0.8"/>
            <text x="500" y="416" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="var(--font-body)">通知</text>
            <text x="500" y="428" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="var(--font-body)">服务</text>
          </g>
          <g class="graph-svg-node">
            <circle cx="520" cy="200" r="22" fill="var(--diff-add)" opacity="0.6"/>
            <text x="520" y="204" text-anchor="middle" fill="white" font-size="9" font-weight="600" font-family="var(--font-mono)">Gateway</text>
          </g>
          <g class="graph-svg-node">
            <circle cx="160" cy="420" r="18" fill="var(--diff-add)" opacity="0.5"/>
            <text x="160" y="424" text-anchor="middle" fill="white" font-size="8" font-weight="500" font-family="var(--font-mono)">Cache</text>
          </g>
        </svg>
      </div>
    </div>

    <!-- Center diff stats overlay -->
    <div class="diff-stats-center">
      <div class="diff-stats-title">差异统计</div>
      <div class="diff-stat-row">
        <span class="diff-stat-label"><span class="diff-stat-dot add"></span>新增节点</span>
        <span class="diff-stat-value" style="color:var(--diff-add)">12</span>
      </div>
      <div class="diff-stat-row">
        <span class="diff-stat-label"><span class="diff-stat-dot remove"></span>删除节点</span>
        <span class="diff-stat-value" style="color:var(--diff-remove)">3</span>
      </div>
      <div class="diff-stat-row">
        <span class="diff-stat-label"><span class="diff-stat-dot modify"></span>修改节点</span>
        <span class="diff-stat-value" style="color:var(--diff-modify)">8</span>
      </div>
      <div class="diff-stat-row">
        <span class="diff-stat-label"><span class="diff-stat-dot add"></span>新增边</span>
        <span class="diff-stat-value" style="color:var(--diff-add)">15</span>
      </div>
      <div class="diff-stat-row">
        <span class="diff-stat-label"><span class="diff-stat-dot remove"></span>删除边</span>
        <span class="diff-stat-value" style="color:var(--diff-remove)">5</span>
      </div>
    </div>
  </div>

  <!-- Bottom legend -->
  <div class="diff-legend">
    <div class="legend-item"><span class="legend-dot add"></span>新增</div>
    <div class="legend-item"><span class="legend-dot remove"></span>删除</div>
    <div class="legend-item"><span class="legend-dot modify"></span>修改</div>
    <div class="legend-item"><span class="legend-dot unchanged"></span>未变更</div>
  </div>
</div>

<script>
const toggleBtn = document.createElement('button');
toggleBtn.className = 'btn dark-toggle';
toggleBtn.innerHTML = '<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 3a5 5 0 1 0 0 10A5 5 0 0 0 8 3z"/><path d="M8 1v2M8 13v2M3 8H1M15 8h-2M4.2 4.2l1.4 1.4M10.4 10.4l1.4 1.4M4.2 11.8l1.4-1.4M10.4 5.6l1.4-1.4"/></svg>';
toggleBtn.title = '切换暗色模式';
document.body.appendChild(toggleBtn);
toggleBtn.addEventListener('click', () => document.documentElement.classList.toggle('dark'));
</script>
</body>
</html>
