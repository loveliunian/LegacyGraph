<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphify 质量面板 - LegacyGraph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --space-4: 16px; --space-5: 20px; --space-6: 24px;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  --c-primary: #6366F1; --c-primary-light: #9293F4; --c-primary-bg: #EFF0FE;
  --c-success: #14B8A6; --c-success-bg: #E8F8F6;
  --c-warning: #F59E0B; --c-warning-bg: #FCF5EA;
  --c-danger: #EF4444; --c-danger-bg: #FCE1E1;
  --c-info: #909399; --c-info-bg: #EFEFF1;
  --el-text-color-primary: #1D1D1F; --el-text-color-regular: #424245; --el-text-color-secondary: #6E6E73; --el-text-color-placeholder: #A1A1A6;
  --el-border-color: #D1D1D6; --el-border-color-light: #E5E5EA; --el-border-color-lighter: #EDEDF0;
  --el-fill-color: #F5F5F7; --el-fill-color-light: #FAFAFA;
  --el-bg-color: #ffffff; --el-bg-color-page: #F5F5F7; --el-bg-color-overlay: #ffffff;
}
html.dark {
  --c-primary: #818CF8; --c-primary-bg: #0D0E19;
  --c-success: #2DD4BF; --c-warning: #FBBF24; --c-danger: #F87171; --c-info: #9CA3AF;
  --el-text-color-primary: #F5F5F7; --el-text-color-regular: #D1D1D6; --el-text-color-secondary: #8E8E93; --el-text-color-placeholder: #636366;
  --el-border-color: #48484A; --el-border-color-light: #38383A; --el-border-color-lighter: #2C2C2E;
  --el-fill-color: #2C2C2E; --el-bg-color: #1C1C1E; --el-bg-color-page: #000000; --el-bg-color-overlay: #2C2C2E;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); color: var(--el-text-color-primary); background: var(--el-bg-color-page); line-height: 1.6; }
.content-area { max-width: 1200px; margin: 0 auto; padding: var(--space-6); }
.page-header { margin-bottom: var(--space-6); }
.page-title { font-family: var(--font-display); font-size: 28px; color: var(--el-text-color-primary); margin-bottom: 4px; }
.dark-toggle { position: fixed; top: 16px; right: 16px; z-index: 100; background: var(--el-fill-color); border: 1px solid var(--el-border-color); color: var(--el-text-color-primary); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font-body); font-size: 13px; transition: background .2s; }
.dark-toggle:hover { background: var(--el-fill-color-light); }

/* Quality stat cards */
.quality-stats {
  display: flex;
  gap: var(--space-5);
  margin-bottom: var(--space-6);
}
.quality-card {
  flex: 1;
  background: var(--el-bg-color);
  border: 1px solid var(--el-border-color-lighter);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-4);
}
.circle-progress {
  position: relative;
  width: 80px;
  height: 80px;
}
.circle-progress svg {
  transform: rotate(-90deg);
}
.circle-progress .bg-ring {
  fill: none;
  stroke: var(--el-fill-color);
  stroke-width: 6;
}
.circle-progress .fg-ring {
  fill: none;
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset .6s ease;
}
.circle-progress .value {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 600;
  color: var(--el-text-color-primary);
}
.quality-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--el-text-color-primary);
}

/* Issue table */
.table-card {
  background: var(--el-bg-color);
  border: 1px solid var(--el-border-color-lighter);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.table-card table { width: 100%; border-collapse: collapse; }
.table-card th {
  background: var(--el-fill-color);
  font-size: 13px; font-weight: 600;
  color: var(--el-text-color-secondary);
  text-align: left;
  padding: 12px 16px;
  border-bottom: 1px solid var(--el-border-color-lighter);
  white-space: nowrap;
}
.table-card td {
  padding: 12px 16px;
  font-size: 14px;
  color: var(--el-text-color-regular);
  border-bottom: 1px solid var(--el-border-color-lighter);
  vertical-align: middle;
}
.table-card tr:last-child td { border-bottom: none; }
.table-card tr:hover td { background: var(--el-fill-color-light); }
.tag {
  display: inline-block; padding: 2px 8px;
  border-radius: 10px; font-size: 12px; font-weight: 500; white-space: nowrap;
}
.tag-completeness { background: var(--c-primary-bg); color: var(--c-primary); }
.tag-consistency { background: var(--c-warning-bg); color: var(--c-warning); }
.tag-accuracy { background: var(--c-success-bg); color: var(--c-success); }
.tag-usability { background: var(--c-info-bg); color: var(--c-info); }
.tag-high { background: var(--c-danger-bg); color: var(--c-danger); }
.tag-medium { background: var(--c-warning-bg); color: var(--c-warning); }
.tag-low { background: var(--c-info-bg); color: var(--c-info); }
.tag-open { background: var(--c-warning-bg); color: var(--c-warning); }
.tag-fixing { background: var(--c-primary-bg); color: var(--c-primary); }
.section-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--el-text-color-primary);
  margin-bottom: var(--space-4);
}
</style>
</head>
<body>

<button class="dark-toggle" onclick="document.documentElement.classList.toggle('dark')">Toggle Dark</button>

<div class="content-area">
  <div class="page-header">
    <div class="page-title">Graphify 质量面板</div>
  </div>

  <div class="quality-stats">
    <!-- Completeness 92% -->
    <div class="quality-card">
      <div class="circle-progress">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="bg-ring" cx="40" cy="40" r="34"/>
          <circle class="fg-ring" cx="40" cy="40" r="34"
            stroke="#6366F1"
            stroke-dasharray="213.6"
            stroke-dashoffset="17.1"/>
        </svg>
        <span class="value">92%</span>
      </div>
      <div class="quality-label">完整性</div>
    </div>
    <!-- Consistency 88% -->
    <div class="quality-card">
      <div class="circle-progress">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="bg-ring" cx="40" cy="40" r="34"/>
          <circle class="fg-ring" cx="40" cy="40" r="34"
            stroke="#F59E0B"
            stroke-dasharray="213.6"
            stroke-dashoffset="25.6"/>
        </svg>
        <span class="value">88%</span>
      </div>
      <div class="quality-label">一致性</div>
    </div>
    <!-- Accuracy 95% -->
    <div class="quality-card">
      <div class="circle-progress">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="bg-ring" cx="40" cy="40" r="34"/>
          <circle class="fg-ring" cx="40" cy="40" r="34"
            stroke="#14B8A6"
            stroke-dasharray="213.6"
            stroke-dashoffset="10.7"/>
        </svg>
        <span class="value">95%</span>
      </div>
      <div class="quality-label">准确性</div>
    </div>
    <!-- Usability 90% -->
    <div class="quality-card">
      <div class="circle-progress">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="bg-ring" cx="40" cy="40" r="34"/>
          <circle class="fg-ring" cx="40" cy="40" r="34"
            stroke="#909399"
            stroke-dasharray="213.6"
            stroke-dashoffset="21.4"/>
        </svg>
        <span class="value">90%</span>
      </div>
      <div class="quality-label">可用性</div>
    </div>
  </div>

  <div class="section-title">质量问题列表</div>
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>问题类型</th>
          <th>问题描述</th>
          <th>严重程度</th>
          <th>影响范围</th>
          <th>状态</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="tag tag-completeness">完整性</span></td>
          <td>payment-gateway 模块缺少 3 个内部类的定义</td>
          <td><span class="tag tag-medium">中</span></td>
          <td>payment-gateway 模块</td>
          <td><span class="tag tag-open">待处理</span></td>
        </tr>
        <tr>
          <td><span class="tag tag-consistency">一致性</span></td>
          <td>t_order 表字段与 OrderService 实体映射不一致</td>
          <td><span class="tag tag-high">高</span></td>
          <td>OrderService, t_order</td>
          <td><span class="tag tag-fixing">修复中</span></td>
        </tr>
        <tr>
          <td><span class="tag tag-accuracy">准确性</span></td>
          <td>Redis Cache 连接配置已过期，指向旧集群地址</td>
          <td><span class="tag tag-low">低</span></td>
          <td>基础设施层</td>
          <td><span class="tag tag-open">待处理</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
