<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编辑测试用例 - LegacyGraph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --space-4: 16px; --space-5: 20px; --space-6: 24px;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  --c-primary: #6366F1; --c-primary-light: #9293F4; --c-primary-bg: #EFF0FE;
  --c-success: #14B8A6; --c-success-bg: #E8F8F6;
  --c-warning: #F59E0B; --c-warning-bg: #FCF5EA;
  --c-danger: #EF4444; --c-danger-bg: #FCE1E1;
  --c-info: #909399; --c-info-bg: #EFEFF1;
  --el-text-color-primary: #1D1D1F; --el-text-color-regular: #424245; --el-text-color-secondary: #6E6E73; --el-text-color-placeholder: #A1A1A6;
  --el-border-color: #D1D1D6; --el-border-color-light: #E5E5EA; --el-border-color-lighter: #EDEDF0;
  --el-fill-color: #F5F5F7; --el-fill-color-light: #FAFAFA;
  --el-bg-color: #ffffff; --el-bg-color-page: #F5F5F7; --el-bg-color-overlay: #ffffff;
}
html.dark {
  --c-primary: #818CF8; --c-primary-bg: #0D0E19;
  --c-success: #2DD4BF; --c-warning: #FBBF24; --c-danger: #F87171; --c-info: #9CA3AF;
  --el-text-color-primary: #F5F5F7; --el-text-color-regular: #D1D1D6; --el-text-color-secondary: #8E8E93; --el-text-color-placeholder: #636366;
  --el-border-color: #48484A; --el-border-color-light: #38383A; --el-border-color-lighter: #2C2C2E;
  --el-fill-color: #2C2C2E; --el-bg-color: #1C1C1E; --el-bg-color-page: #000000; --el-bg-color-overlay: #2C2C2E;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body); font-size: 14px; color: var(--el-text-color-primary);
  background: var(--el-bg-color-page); line-height: 1.6; -webkit-font-smoothing: antialiased;
}
.page-container { max-width: 1200px; margin: 0 auto; padding: var(--space-5) var(--space-6); }
.breadcrumb { font-size: 13px; color: var(--el-text-color-secondary); margin-bottom: var(--space-4); }
.breadcrumb a { color: var(--c-primary); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb span { margin: 0 6px; color: var(--el-text-color-placeholder); }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-5); }
.page-header h1 { font-family: var(--font-body); font-size: 20px; font-weight: 700; color: var(--el-text-color-primary); }
.dark-toggle {
  width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--el-border-color);
  background: var(--el-bg-color); cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--el-text-color-secondary); font-size: 16px; transition: all .2s;
}
.dark-toggle:hover { border-color: var(--c-primary); color: var(--c-primary); }
.card {
  background: var(--el-bg-color); border: 1px solid var(--el-border-color-light);
  border-radius: var(--radius-lg); padding: var(--space-6);
}
.form-group { margin-bottom: var(--space-5); }
.form-group label {
  display: block; font-size: 13px; font-weight: 600; color: var(--el-text-color-regular);
  margin-bottom: 8px;
}
.form-group label .required { color: var(--c-danger); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 8px 12px; border: 1px solid var(--el-border-color);
  border-radius: var(--radius-sm); background: var(--el-bg-color); color: var(--el-text-color-regular);
  font-family: var(--font-body); font-size: 13px; outline: none; transition: border-color .2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--c-primary);
}
.form-group textarea { resize: vertical; font-family: var(--font-body); }
.section-title {
  font-size: 15px; font-weight: 700; color: var(--el-text-color-primary);
  margin-bottom: var(--space-4); padding-bottom: 8px;
  border-bottom: 1px solid var(--el-border-color-lighter);
}
.step-list, .assertion-list { margin-bottom: var(--space-4); }
.step-row, .assertion-row {
  display: grid; gap: 12px; align-items: end; margin-bottom: 12px; padding: 12px;
  background: var(--el-fill-color-light); border-radius: var(--radius-md);
  border: 1px solid var(--el-border-color-lighter);
}
.step-row { grid-template-columns: 1fr 1fr auto; }
.assertion-row { grid-template-columns: 1fr 180px auto; }
.step-row label, .assertion-row label {
  display: block; font-size: 12px; font-weight: 500; color: var(--el-text-color-secondary);
  margin-bottom: 4px;
}
.step-row input, .assertion-row input, .assertion-row select {
  width: 100%; padding: 8px 12px; border: 1px solid var(--el-border-color);
  border-radius: var(--radius-sm); background: var(--el-bg-color); color: var(--el-text-color-regular);
  font-family: var(--font-body); font-size: 13px; outline: none; transition: border-color .2s;
}
.step-row input:focus, .assertion-row input:focus, .assertion-row select:focus {
  border-color: var(--c-primary);
}
.btn-icon {
  width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--el-border-color);
  background: var(--el-bg-color); color: var(--c-danger); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  transition: all .2s; flex-shrink: 0;
}
.btn-icon:hover { background: var(--c-danger-bg); border-color: var(--c-danger); }
.btn-add {
  display: inline-flex; align-items: center; gap: 4px; padding: 8px 16px;
  border: 1px dashed var(--el-border-color); border-radius: var(--radius-sm);
  background: transparent; color: var(--c-primary); font-family: var(--font-body);
  font-size: 13px; cursor: pointer; transition: all .2s;
}
.btn-add:hover { border-color: var(--c-primary); background: var(--c-primary-bg); }
.form-actions {
  display: flex; gap: 12px; padding-top: var(--space-5); margin-top: var(--space-5);
  border-top: 1px solid var(--el-border-color-lighter);
}
.btn {
  height: 40px; padding: 0 24px; border-radius: var(--radius-sm); border: 1px solid var(--el-border-color);
  font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all .2s; display: inline-flex; align-items: center;
}
.btn-default { background: var(--el-bg-color); color: var(--el-text-color-regular); }
.btn-default:hover { border-color: var(--c-primary); color: var(--c-primary); }
.btn-primary { background: var(--c-primary); color: #fff; border-color: var(--c-primary); }
.btn-primary:hover { background: var(--c-primary-light); }
.btn-warning { background: var(--c-warning); color: #fff; border-color: var(--c-warning); }
.btn-warning:hover { opacity: .9; }
</style>
</head>
<body>
<div class="page-container">
  <div class="breadcrumb"><a href="#">LegacyGraph</a><span>/</span>测试用例<span>/</span>编辑测试用例</div>

  <div class="page-header">
    <h1>编辑测试用例</h1>
    <button class="dark-toggle" onclick="document.documentElement.classList.toggle('dark')" title="切换暗色模式">&#9790;</button>
  </div>

  <div class="card">
    <div class="form-group">
      <label>用例名称 <span class="required">*</span></label>
      <input type="text" value="验证JWT Token正常签发和校验流程" />
    </div>

    <div class="form-group">
      <label>用例类型 <span class="required">*</span></label>
      <select>
        <option>单元测试</option>
        <option>集成测试</option>
        <option>端到端</option>
      </select>
    </div>

    <div class="form-group">
      <label>覆盖模块 <span class="required">*</span></label>
      <input type="text" value="用户认证" />
    </div>

    <div class="form-group">
      <label>前置条件</label>
      <textarea rows="3">1. 系统已部署并启动&#10;2. 测试数据库已初始化&#10;3. JWT密钥已配置</textarea>
    </div>

    <div class="section-title">测试步骤</div>
    <div class="step-list">
      <div class="step-row">
        <div>
          <label>步骤描述</label>
          <input type="text" value="调用 POST /api/auth/login 接口，传入正确用户名密码" />
        </div>
        <div>
          <label>预期结果</label>
          <input type="text" value="返回200状态码，响应体包含有效的JWT Token" />
        </div>
        <button class="btn-icon" title="删除步骤">&times;</button>
      </div>
      <div class="step-row">
        <div>
          <label>步骤描述</label>
          <input type="text" value="使用返回的Token调用 GET /api/user/profile 接口" />
        </div>
        <div>
          <label>预期结果</label>
          <input type="text" value="返回200状态码，正确获取用户信息" />
        </div>
        <button class="btn-icon" title="删除步骤">&times;</button>
      </div>
      <div class="step-row">
        <div>
          <label>步骤描述</label>
          <input type="text" value="等待7天后使用同一Token再次调用接口" />
        </div>
        <div>
          <label>预期结果</label>
          <input type="text" value="返回401状态码，提示Token已过期" />
        </div>
        <button class="btn-icon" title="删除步骤">&times;</button>
      </div>
    </div>
    <button class="btn-add">+ 添加步骤</button>

    <div class="section-title" style="margin-top:var(--space-6)">断言</div>
    <div class="assertion-list">
      <div class="assertion-row">
        <div>
          <label>断言描述</label>
          <input type="text" value="响应体中 token 字段不为空" />
        </div>
        <div>
          <label>断言类型</label>
          <select>
            <option>不包含</option>
            <option>包含</option>
            <option>等于</option>
            <option>大于</option>
            <option>小于</option>
          </select>
        </div>
        <button class="btn-icon" title="删除断言">&times;</button>
      </div>
      <div class="assertion-row">
        <div>
          <label>断言描述</label>
          <input type="text" value="HTTP状态码等于200" />
        </div>
        <div>
          <label>断言类型</label>
          <select>
            <option selected>等于</option>
            <option>包含</option>
            <option>不包含</option>
            <option>大于</option>
            <option>小于</option>
          </select>
        </div>
        <button class="btn-icon" title="删除断言">&times;</button>
      </div>
    </div>
    <button class="btn-add">+ 添加断言</button>

    <div class="form-actions">
      <button class="btn btn-primary">保存</button>
      <button class="btn btn-default">取消</button>
      <button class="btn btn-warning">执行测试</button>
    </div>
  </div>
</div>
</body>
</html>
