<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphify 任务中心 - LegacyGraph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --space-4: 16px; --space-5: 20px; --space-6: 24px;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  --c-primary: #6366F1; --c-primary-light: #9293F4; --c-primary-bg: #EFF0FE;
  --c-success: #14B8A6; --c-success-bg: #E8F8F6;
  --c-warning: #F59E0B; --c-warning-bg: #FCF5EA;
  --c-danger: #EF4444; --c-danger-bg: #FCE1E1;
  --c-info: #909399; --c-info-bg: #EFEFF1;
  --el-text-color-primary: #1D1D1F; --el-text-color-regular: #424245; --el-text-color-secondary: #6E6E73; --el-text-color-placeholder: #A1A1A6;
  --el-border-color: #D1D1D6; --el-border-color-light: #E5E5EA; --el-border-color-lighter: #EDEDF0;
  --el-fill-color: #F5F5F7; --el-fill-color-light: #FAFAFA;
  --el-bg-color: #ffffff; --el-bg-color-page: #F5F5F7; --el-bg-color-overlay: #ffffff;
}
html.dark {
  --c-primary: #818CF8; --c-primary-bg: #0D0E19;
  --c-success: #2DD4BF; --c-warning: #FBBF24; --c-danger: #F87171; --c-info: #9CA3AF;
  --el-text-color-primary: #F5F5F7; --el-text-color-regular: #D1D1D6; --el-text-color-secondary: #8E8E93; --el-text-color-placeholder: #636366;
  --el-border-color: #48484A; --el-border-color-light: #38383A; --el-border-color-lighter: #2C2C2E;
  --el-fill-color: #2C2C2E; --el-bg-color: #1C1C1E; --el-bg-color-page: #000000; --el-bg-color-overlay: #2C2C2E;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); color: var(--el-text-color-primary); background: var(--el-bg-color-page); line-height: 1.6; }
.content-area { max-width: 1200px; margin: 0 auto; padding: var(--space-6); }
.page-header { margin-bottom: var(--space-6); }
.page-title { font-family: var(--font-display); font-size: 28px; color: var(--el-text-color-primary); margin-bottom: 4px; }
.page-subtitle { font-size: 14px; color: var(--el-text-color-secondary); }
.dark-toggle { position: fixed; top: 16px; right: 16px; z-index: 100; background: var(--el-fill-color); border: 1px solid var(--el-border-color); color: var(--el-text-color-primary); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font-body); font-size: 13px; transition: background .2s; }
.dark-toggle:hover { background: var(--el-fill-color-light); }
.search-form { background: var(--el-bg-color); border: 1px solid var(--el-border-color-lighter); border-radius: var(--radius-lg); padding: var(--space-5) var(--space-6); margin-bottom: var(--space-5); display: flex; flex-wrap: wrap; gap: var(--space-4); align-items: flex-end; }
.form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
.form-group label { font-size: 13px; font-weight: 600; color: var(--el-text-color-secondary); }
.form-group input, .form-group select { height: 36px; padding: 0 12px; border: 1px solid var(--el-border-color); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 14px; color: var(--el-text-color-primary); background: var(--el-bg-color); outline: none; transition: border-color .2s; }
.form-group input:focus, .form-group select:focus { border-color: var(--c-primary); }
.btn { height: 36px; padding: 0 20px; border: none; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; white-space: nowrap; }
.btn:hover { opacity: .85; }
.btn-primary { background: var(--c-primary); color: #fff; }
.btn-default { background: var(--el-fill-color); color: var(--el-text-color-regular); border: 1px solid var(--el-border-color); }
.table-card { background: var(--el-bg-color); border: 1px solid var(--el-border-color-lighter); border-radius: var(--radius-lg); overflow: hidden; }
.table-card table { width: 100%; border-collapse: collapse; }
.table-card th { background: var(--el-fill-color); font-size: 13px; font-weight: 600; color: var(--el-text-color-secondary); text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--el-border-color-lighter); white-space: nowrap; }
.table-card td { padding: 12px 16px; font-size: 14px; color: var(--el-text-color-regular); border-bottom: 1px solid var(--el-border-color-lighter); vertical-align: middle; }
.table-card tr:last-child td { border-bottom: none; }
.table-card tr:hover td { background: var(--el-fill-color-light); }
.tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 500; white-space: nowrap; }
.tag-analysis { background: var(--c-primary-bg); color: var(--c-primary); }
.tag-optimize { background: var(--c-success-bg); color: var(--c-success); }
.tag-compare { background: var(--c-warning-bg); color: var(--c-warning); }
.tag-completed { background: var(--c-success-bg); color: var(--c-success); }
.tag-running { background: var(--c-primary-bg); color: var(--c-primary); }
.tag-queued { background: var(--c-info-bg); color: var(--c-info); }
.action-link { color: var(--c-primary); font-size: 13px; cursor: pointer; text-decoration: none; margin-right: 12px; }
.action-link:hover { text-decoration: underline; }
.action-link:last-child { margin-right: 0; }
.mono { font-family: var(--font-mono); font-size: 13px; color: var(--el-text-color-secondary); }
.task-name { font-weight: 600; color: var(--el-text-color-primary); }
</style>
</head>
<body>

<button class="dark-toggle" onclick="document.documentElement.classList.toggle('dark')">Toggle Dark</button>

<div class="content-area">
  <div class="page-header">
    <div class="page-title">Graphify 任务中心</div>
    <div class="page-subtitle">管理 Graphify 自动化分析和优化任务</div>
  </div>

  <div class="search-form">
    <div class="form-group">
      <label>任务名称</label>
      <input type="text" placeholder="搜索任务名称...">
    </div>
    <div class="form-group">
      <label>状态</label>
      <select>
        <option>全部</option>
        <option>已完成</option>
        <option>运行中</option>
        <option>队列中</option>
        <option>失败</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;align-self:flex-end;">
      <button class="btn btn-primary">查询</button>
      <button class="btn btn-default">重置</button>
    </div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>任务ID</th>
          <th>任务名称</th>
          <th>类型</th>
          <th>状态</th>
          <th>创建时间</th>
          <th>完成时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="mono">GF-201</span></td>
          <td><span class="task-name">全量架构分析 - v2.3</span></td>
          <td><span class="tag tag-analysis">分析</span></td>
          <td><span class="tag tag-completed">已完成</span></td>
          <td><span class="mono">2026-07-09 08:00</span></td>
          <td><span class="mono">2026-07-09 08:45</span></td>
          <td>
            <a class="action-link">查看</a>
            <a class="action-link">重新执行</a>
          </td>
        </tr>
        <tr>
          <td><span class="mono">GF-202</span></td>
          <td><span class="task-name">图谱质量优化</span></td>
          <td><span class="tag tag-optimize">优化</span></td>
          <td><span class="tag tag-running">运行中</span></td>
          <td><span class="mono">2026-07-10 10:30</span></td>
          <td><span class="mono">--</span></td>
          <td>
            <a class="action-link">查看</a>
            <a class="action-link">取消</a>
          </td>
        </tr>
        <tr>
          <td><span class="mono">GF-203</span></td>
          <td><span class="task-name">v2.2 与 v2.3 差异对比</span></td>
          <td><span class="tag tag-compare">对比</span></td>
          <td><span class="tag tag-queued">队列中</span></td>
          <td><span class="mono">2026-07-10 10:32</span></td>
          <td><span class="mono">--</span></td>
          <td>
            <a class="action-link">查看</a>
            <a class="action-link">取消</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
