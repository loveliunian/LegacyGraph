<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegacyGraph - 系统管理</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    :root {
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --space-4: 16px; --space-5: 20px; --space-6: 24px;
      --radius-sm: 6px; --radius-md: 8px;
      --c-primary: #6366F1; --c-primary-light: #9293F4; --c-primary-bg: #EFF0FE;
      --c-success: #14B8A6; --c-success-bg: #E8F8F6;
      --c-warning: #F59E0B; --c-warning-bg: #FCF5EA;
      --c-danger: #EF4444; --c-danger-bg: #FCE1E1;
      --c-info: #909399; --c-info-bg: #EFEFF1;
      --gradient-brand: linear-gradient(135deg, #6366F1, #8B5CF6, #A78BFA);
      --el-text-color-primary: #1D1D1F; --el-text-color-regular: #424245; --el-text-color-secondary: #6E6E73; --el-text-color-placeholder: #A1A1A6;
      --el-border-color: #D1D1D6; --el-border-color-light: #E5E5EA; --el-border-color-lighter: #EDEDF0;
      --el-fill-color: #F5F5F7; --el-fill-color-light: #FAFAFA;
      --el-bg-color: #ffffff; --el-bg-color-page: #F5F5F7; --el-bg-color-overlay: #ffffff;
    }
    html.dark {
      --c-primary: #818CF8; --c-primary-bg: #0D0E19;
      --c-success: #2DD4BF; --c-warning: #FBBF24; --c-danger: #F87171; --c-info: #9CA3AF;
      --gradient-brand: linear-gradient(135deg, #818CF8, #A78BFA, #C4B5FD);
      --el-text-color-primary: #F5F5F7; --el-text-color-regular: #D1D1D6; --el-text-color-secondary: #8E8E93; --el-text-color-placeholder: #636366;
      --el-border-color: #48484A; --el-border-color-light: #38383A; --el-border-color-lighter: #2C2C2E;
      --el-fill-color: #2C2C2E; --el-bg-color: #1C1C1E; --el-bg-color-page: #000000; --el-bg-color-overlay: #2C2C2E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); color: var(--el-text-color-primary); background: var(--el-bg-color-page); min-height: 100vh; }

    /* === Page Container === */
    .page-container {
      padding: var(--space-6);
    }

    /* === Page Header === */
    .page-header {
      margin-bottom: var(--space-6);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--el-text-color-primary);
      margin-bottom: 4px;
    }
    .page-header .description {
      font-size: 14px;
      color: var(--el-text-color-secondary);
    }

    /* === Tab Navigation === */
    .tab-bar {
      background: var(--el-bg-color);
      border: 1px solid var(--el-border-color-lighter);
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      display: flex;
      padding: 0;
      overflow-x: auto;
      position: relative;
    }
    .tab-bar .tab-item {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--el-text-color-secondary);
      cursor: pointer;
      white-space: nowrap;
      position: relative;
      transition: color 0.2s;
      user-select: none;
    }
    .tab-bar .tab-item:hover {
      color: var(--c-primary-light);
    }
    .tab-bar .tab-item.active {
      color: var(--c-primary);
    }
    .tab-bar .tab-item.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20px;
      right: 20px;
      height: 2px;
      background: var(--c-primary);
      border-radius: 1px;
    }

    /* === Tab Content === */
    .tab-content {
      background: var(--el-bg-color);
      border: 1px solid var(--el-border-color-lighter);
      border-top: none;
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      padding: var(--space-6);
      min-height: 400px;
    }

    /* === Search Form === */
    .search-form {
      background: var(--el-fill-color);
      padding: var(--space-5);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-5);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .form-field {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-field label {
      font-size: 14px;
      color: var(--el-text-color-regular);
      white-space: nowrap;
    }
    .form-input {
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--el-border-color-light);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font-body);
      color: var(--el-text-color-primary);
      background: var(--el-bg-color);
      outline: none;
      transition: border-color 0.2s;
      min-width: 200px;
    }
    .form-input:focus {
      border-color: var(--c-primary);
    }
    .form-input::placeholder {
      color: var(--el-text-color-placeholder);
    }

    /* Buttons */
    .btn {
      height: 32px;
      padding: 0 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font-body);
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:active { opacity: 0.85; }
    .btn-primary {
      background: var(--c-primary);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-default {
      background: var(--el-bg-color);
      color: var(--el-text-color-regular);
      border: 1px solid var(--el-border-color);
    }
    .btn-default:hover { background: var(--el-fill-color-light); }
    .btn svg { width: 14px; height: 14px; }

    .form-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    /* === Table === */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .data-table thead th {
      text-align: left;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 13px;
      color: var(--el-text-color-secondary);
      background: var(--el-fill-color);
      border-bottom: 1px solid var(--el-border-color-lighter);
    }
    .data-table tbody td {
      padding: 12px 16px;
      color: var(--el-text-color-regular);
      border-bottom: 1px solid var(--el-border-color-lighter);
    }
    .data-table tbody tr {
      transition: background 0.15s;
    }
    .data-table tbody tr:hover {
      background: var(--el-fill-color-light);
    }
    .data-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* Status Tags */
    .status-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-tag.success {
      background: var(--c-success-bg);
      color: var(--c-success);
    }
    .status-tag.danger {
      background: var(--c-danger-bg);
      color: var(--c-danger);
    }
    .status-tag.warning {
      background: var(--c-warning-bg);
      color: var(--c-warning);
    }

    /* Role Tags */
    .role-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      background: var(--c-primary-bg);
      color: var(--c-primary);
    }

    /* Action Links */
    .action-link {
      font-size: 13px;
      color: var(--c-primary);
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .action-link:hover { opacity: 0.7; }
    .action-link.danger { color: var(--c-danger); }
    .action-link + .action-link { margin-left: 12px; }

    /* === Pagination === */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-top: var(--space-5);
      gap: 6px;
    }
    .pagination .page-info {
      font-size: 13px;
      color: var(--el-text-color-secondary);
      margin-right: 12px;
    }
    .pagination .page-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--el-border-color-light);
      border-radius: var(--radius-sm);
      background: var(--el-bg-color);
      color: var(--el-text-color-regular);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pagination .page-btn:hover {
      color: var(--c-primary);
      border-color: var(--c-primary);
    }
    .pagination .page-btn.active {
      background: var(--c-primary);
      color: #fff;
      border-color: var(--c-primary);
    }
    .pagination .page-btn svg {
      width: 14px;
      height: 14px;
    }
    .pagination .page-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* === Theme Toggle (floating) === */
    .theme-toggle-float {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 200;
    }
    .theme-toggle-float .icon-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--el-border-color-light);
      background: var(--el-bg-color);
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--el-text-color-secondary);
      transition: all 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .theme-toggle-float .icon-btn:hover {
      background: var(--el-fill-color);
      color: var(--el-text-color-primary);
    }
    .theme-toggle-float .icon-btn svg {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>
  <!-- Floating Theme Toggle -->
  <div class="theme-toggle-float">
    <button class="icon-btn" id="themeToggle" title="切换主题">
      <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>

  <!-- Page Container -->
  <div class="page-container">
    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1>系统管理</h1>
        <p class="description">管理用户、字典、配置和日志</p>
      </div>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-bar" id="tabBar">
      <div class="tab-item active" data-tab="users">用户管理</div>
      <div class="tab-item" data-tab="dict">数据字典</div>
      <div class="tab-item" data-tab="settings">系统设置</div>
      <div class="tab-item" data-tab="models">模型配置</div>
      <div class="tab-item" data-tab="prompts">提示词管理</div>
      <div class="tab-item" data-tab="plugins">插件管理</div>
      <div class="tab-item" data-tab="logs">日志管理</div>
    </div>

    <!-- Tab Content: 用户管理 -->
    <div class="tab-content" id="tabContent">
      <!-- Search Form -->
      <div class="search-form">
        <div class="form-field">
          <label>用户名</label>
          <input type="text" class="form-input" placeholder="请输入用户名">
        </div>
        <div class="form-field">
          <label>状态</label>
          <select class="form-input">
            <option value="">全部</option>
            <option value="active">启用</option>
            <option value="disabled">禁用</option>
          </select>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            搜索
          </button>
          <button class="btn btn-default">重置</button>
        </div>
      </div>

      <!-- Data Table -->
      <table class="data-table">
        <thead>
          <tr>
            <th>用户名</th>
            <th>姓名</th>
            <th>邮箱</th>
            <th>角色</th>
            <th>状态</th>
            <th>创建时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style="font-family:var(--font-mono);font-size:13px;">zhangsan</td>
            <td>张三</td>
            <td>zhangsan@example.com</td>
            <td><span class="role-tag">管理员</span></td>
            <td><span class="status-tag success">启用</span></td>
            <td style="color:var(--el-text-color-secondary);font-size:13px;">2025-06-15 10:30</td>
            <td>
              <a class="action-link">编辑</a>
              <a class="action-link danger">删除</a>
            </td>
          </tr>
          <tr>
            <td style="font-family:var(--font-mono);font-size:13px;">lisi</td>
            <td>李四</td>
            <td>lisi@example.com</td>
            <td><span class="role-tag">开发者</span></td>
            <td><span class="status-tag success">启用</span></td>
            <td style="color:var(--el-text-color-secondary);font-size:13px;">2025-07-02 14:22</td>
            <td>
              <a class="action-link">编辑</a>
              <a class="action-link danger">删除</a>
            </td>
          </tr>
          <tr>
            <td style="font-family:var(--font-mono);font-size:13px;">wangwu</td>
            <td>王五</td>
            <td>wangwu@example.com</td>
            <td><span class="role-tag">观察者</span></td>
            <td><span class="status-tag danger">禁用</span></td>
            <td style="color:var(--el-text-color-secondary);font-size:13px;">2025-08-18 09:15</td>
            <td>
              <a class="action-link">编辑</a>
              <a class="action-link danger">删除</a>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Pagination -->
      <div class="pagination">
        <span class="page-info">共 15 条</span>
        <button class="page-btn disabled" title="上一页">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <button class="page-btn" title="下一页">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const html = document.documentElement;
      const sunIcon = document.getElementById('sunIcon');
      const moonIcon = document.getElementById('moonIcon');
      const toggle = document.getElementById('themeToggle');

      // Check saved preference
      const savedTheme = localStorage.getItem('lg-theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        html.classList.add('dark');
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      }

      // Theme toggle
      toggle.addEventListener('click', function() {
        const isDark = html.classList.toggle('dark');
        sunIcon.style.display = isDark ? 'block' : 'none';
        moonIcon.style.display = isDark ? 'none' : 'block';
        localStorage.setItem('lg-theme', isDark ? 'dark' : 'light');
      });

      // Tab switching
      const tabBar = document.getElementById('tabBar');
      const tabs = tabBar.querySelectorAll('.tab-item');
      tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          tabs.forEach(function(t) { t.classList.remove('active'); });
          tab.classList.add('active');
        });
      });
    })();
  </script>
</body>
</html>
