<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegacyGraph - 电商平台重构 - 项目概览</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    :root {
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --space-4: 16px; --space-5: 20px; --space-6: 24px;
      --radius-sm: 6px; --radius-md: 8px;
      --c-primary: #6366F1; --c-primary-light: #9293F4; --c-primary-bg: #EFF0FE;
      --c-success: #14B8A6; --c-success-bg: #E8F8F6;
      --c-warning: #F59E0B; --c-warning-bg: #FCF5EA;
      --c-danger: #EF4444; --c-danger-bg: #FCE1E1;
      --c-info: #909399; --c-info-bg: #EFEFF1;
      --gradient-brand: linear-gradient(135deg, #6366F1, #8B5CF6, #A78BFA);
      --el-text-color-primary: #1D1D1F; --el-text-color-regular: #424245; --el-text-color-secondary: #6E6E73; --el-text-color-placeholder: #A1A1A6;
      --el-border-color: #D1D1D6; --el-border-color-light: #E5E5EA; --el-border-color-lighter: #EDEDF0;
      --el-fill-color: #F5F5F7; --el-fill-color-light: #FAFAFA;
      --el-bg-color: #ffffff; --el-bg-color-page: #F5F5F7; --el-bg-color-overlay: #ffffff;
    }
    html.dark {
      --c-primary: #818CF8; --c-primary-bg: #0D0E19;
      --c-success: #2DD4BF; --c-warning: #FBBF24; --c-danger: #F87171; --c-info: #9CA3AF;
      --gradient-brand: linear-gradient(135deg, #818CF8, #A78BFA, #C4B5FD);
      --el-text-color-primary: #F5F5F7; --el-text-color-regular: #D1D1D6; --el-text-color-secondary: #8E8E93; --el-text-color-placeholder: #636366;
      --el-border-color: #48484A; --el-border-color-light: #38383A; --el-border-color-lighter: #2C2C2E;
      --el-fill-color: #2C2C2E; --el-bg-color: #1C1C1E; --el-bg-color-page: #000000; --el-bg-color-overlay: #2C2C2E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); color: var(--el-text-color-primary); background: var(--el-bg-color-page); min-height: 100vh; }

    /* === Layout Shell === */
    .layout-shell {
      display: flex;
      min-height: 100vh;
    }

    /* === Left Sidebar === */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--el-bg-color-overlay);
      border-right: 1px solid var(--el-border-color-light);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* Project Info Area */
    .project-info {
      padding: 20px;
      border-bottom: 1px solid var(--el-border-color-lighter);
    }
    .project-info h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--el-text-color-primary);
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .project-status-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      background: var(--c-primary-bg);
      color: var(--c-primary);
      margin-bottom: 8px;
    }
    .project-status-tag::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--c-primary);
      margin-right: 6px;
    }
    .project-desc {
      font-size: 12px;
      color: var(--el-text-color-secondary);
      line-height: 1.5;
    }

    /* Nav Menu */
    .nav-menu {
      padding: 12px 16px;
      flex: 1;
      overflow-y: auto;
    }
    .nav-group {
      margin-bottom: 16px;
    }
    .nav-group-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--el-text-color-placeholder);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 12px;
      margin-bottom: 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--el-text-color-secondary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      user-select: none;
      border-left: 3px solid transparent;
      margin-bottom: 1px;
    }
    .nav-item:hover {
      background: var(--el-fill-color);
      color: var(--el-text-color-primary);
    }
    .nav-item.active {
      background: var(--c-primary-bg);
      color: var(--c-primary);
      font-weight: 500;
      border-left-color: var(--c-primary);
    }
    .nav-item svg {
      width: 16px;
      height: 16px;
      margin-right: 10px;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .nav-item.active svg {
      opacity: 1;
    }
    .nav-item .badge {
      margin-left: auto;
      background: var(--c-danger-bg);
      color: var(--c-danger);
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      line-height: 1.4;
    }

    /* === Right Content Area === */
    .content-area {
      flex: 1;
      background: var(--el-bg-color-page);
      padding: var(--space-6);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* Breadcrumb */
    .breadcrumb {
      font-size: 12px;
      color: var(--el-text-color-secondary);
      margin-bottom: var(--space-5);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .breadcrumb a {
      color: var(--c-primary);
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .breadcrumb a:hover {
      opacity: 0.8;
    }
    .breadcrumb .separator {
      color: var(--el-text-color-placeholder);
      margin: 0 2px;
    }
    .breadcrumb .current {
      color: var(--el-text-color-primary);
    }

    /* Page Header */
    .page-header {
      margin-bottom: var(--space-6);
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--el-text-color-primary);
      margin-bottom: 4px;
    }

    /* Stat Cards Grid */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-5);
    }
    .stat-card {
      background: var(--el-bg-color);
      border: 1px solid var(--el-border-color-lighter);
      border-radius: var(--radius-md);
      padding: 20px;
      transition: box-shadow 0.2s;
    }
    .stat-card:hover {
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }
    .stat-card .stat-label {
      font-size: 13px;
      color: var(--el-text-color-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-card .stat-label svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .stat-card .stat-value {
      font-size: 28px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--el-text-color-primary);
      line-height: 1.2;
    }
    .stat-card .stat-value .stat-unit {
      font-size: 14px;
      font-weight: 400;
      color: var(--el-text-color-placeholder);
      margin-left: 2px;
    }
    .stat-card.nodes .stat-value { color: var(--c-primary); }
    .stat-card.edges .stat-value { color: var(--c-success); }
    .stat-card.confidence .stat-value { color: var(--c-warning); }
    .stat-card.sources .stat-value { color: var(--c-info); }
  </style>
</head>

  <script>
    (function() {
      const html = document.documentElement;
      // Check saved preference
      const savedTheme = localStorage.getItem('lg-theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        html.classList.add('dark');
      }
      // Theme toggle via keyboard shortcut or could add button to sidebar
      document.addEventListener('keydown', function(e) {
        if (e.altKey && e.key === 'd') {
          const isDark = html.classList.toggle('dark');
          localStorage.setItem('lg-theme', isDark ? 'dark' : 'light');
        }
      });
    })();
  </script>
