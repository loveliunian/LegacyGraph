<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新建扫描 - LegacyGraph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --space-4: 16px; --space-5: 20px; --space-6: 24px;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  --c-primary: #6366F1; --c-primary-light: #9293F4; --c-primary-bg: #EFF0FE;
  --c-success: #14B8A6; --c-success-bg: #E8F8F6;
  --c-warning: #F59E0B; --c-warning-bg: #FCF5EA;
  --c-danger: #EF4444; --c-danger-bg: #FCE1E1;
  --c-info: #909399; --c-info-bg: #EFEFF1;
  --el-text-color-primary: #1D1D1F; --el-text-color-regular: #424245; --el-text-color-secondary: #6E6E73; --el-text-color-placeholder: #A1A1A6;
  --el-border-color: #D1D1D6; --el-border-color-light: #E5E5EA; --el-border-color-lighter: #EDEDF0;
  --el-fill-color: #F5F5F7; --el-fill-color-light: #FAFAFA;
  --el-bg-color: #ffffff; --el-bg-color-page: #F5F5F7; --el-bg-color-overlay: #ffffff;
}
html.dark {
  --c-primary: #818CF8; --c-primary-bg: #0D0E19;
  --c-success: #2DD4BF; --c-warning: #FBBF24; --c-danger: #F87171; --c-info: #9CA3AF;
  --el-text-color-primary: #F5F5F7; --el-text-color-regular: #D1D1D6; --el-text-color-secondary: #8E8E93; --el-text-color-placeholder: #636366;
  --el-border-color: #48484A; --el-border-color-light: #38383A; --el-border-color-lighter: #2C2C2E;
  --el-fill-color: #2C2C2E; --el-bg-color: #1C1C1E; --el-bg-color-page: #000000; --el-bg-color-overlay: #2C2C2E;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); color: var(--el-text-color-primary); background: var(--el-bg-color-page); line-height: 1.6; }
.content-area { max-width: 800px; margin: 0 auto; padding: var(--space-6); }
.page-header { margin-bottom: var(--space-6); }
.page-title { font-family: var(--font-display); font-size: 28px; color: var(--el-text-color-primary); margin-bottom: 4px; }
.dark-toggle { position: fixed; top: 16px; right: 16px; z-index: 100; background: var(--el-fill-color); border: 1px solid var(--el-border-color); color: var(--el-text-color-primary); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font-body); font-size: 13px; transition: background .2s; }
.dark-toggle:hover { background: var(--el-fill-color-light); }

.form-card {
  background: var(--el-bg-color);
  border: 1px solid var(--el-border-color-lighter);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
}
.form-section {
  margin-bottom: var(--space-6);
}
.form-section:last-child { margin-bottom: 0; }
.section-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--el-text-color-primary);
  margin-bottom: var(--space-4);
  padding-bottom: var(--space-4);
  border-bottom: 1px solid var(--el-border-color-lighter);
}
.form-row {
  margin-bottom: var(--space-5);
}
.form-label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: var(--el-text-color-regular);
  margin-bottom: 8px;
}

/* Radio group */
.radio-group {
  display: flex;
  gap: var(--space-5);
}
.radio-item {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--el-text-color-regular);
}
.radio-item input[type="radio"] {
  appearance: none;
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border: 2px solid var(--el-border-color);
  border-radius: 50%;
  position: relative;
  cursor: pointer;
  transition: border-color .2s;
}
.radio-item input[type="radio"]:checked {
  border-color: var(--c-primary);
}
.radio-item input[type="radio"]:checked::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--c-primary);
}

/* Checkbox group */
.checkbox-group {
  display: flex;
  gap: var(--space-5);
}
.checkbox-item {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--el-text-color-regular);
}
.checkbox-item input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border: 2px solid var(--el-border-color);
  border-radius: 4px;
  position: relative;
  cursor: pointer;
  transition: border-color .2s;
}
.checkbox-item input[type="checkbox"]:checked {
  background: var(--c-primary);
  border-color: var(--c-primary);
}
.checkbox-item input[type="checkbox"]:checked::after {
  content: '';
  position: absolute;
  top: 2px; left: 5px;
  width: 5px; height: 9px;
  border: 2px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(45deg);
}

/* Multi-select chip area */
.chip-area {
  border: 1px dashed var(--el-border-color);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  min-height: 80px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: 1px solid var(--el-border-color);
  border-radius: 20px;
  font-size: 13px;
  color: var(--el-text-color-regular);
  cursor: pointer;
  transition: all .2s;
  user-select: none;
}
.chip:hover { border-color: var(--c-primary); color: var(--c-primary); }
.chip.selected {
  background: var(--c-primary-bg);
  border-color: var(--c-primary);
  color: var(--c-primary);
  font-weight: 600;
}
.chip-check {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--el-border-color);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
  transition: all .2s;
}
.chip.selected .chip-check {
  background: var(--c-primary);
  border-color: var(--c-primary);
  color: #fff;
}

/* Toggle */
.option-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-5);
  min-height: 36px;
}
.option-label {
  font-size: 14px;
  color: var(--el-text-color-regular);
}
.toggle {
  width: 44px;
  height: 24px;
  background: var(--el-border-color);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  transition: background .2s;
}
.toggle.active { background: var(--c-primary); }
.toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 20px; height: 20px;
  background: #fff;
  border-radius: 50%;
  transition: transform .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.15);
}
.toggle.active::after { transform: translateX(20px); }

/* Slider */
.slider-group {
  display: flex;
  align-items: center;
  gap: var(--space-4);
}
.slider-group input[type="range"] {
  flex: 1;
  appearance: none;
  -webkit-appearance: none;
  height: 6px;
  background: var(--el-fill-color);
  border-radius: 3px;
  outline: none;
}
.slider-group input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--c-primary);
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.slider-val {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--c-primary);
  min-width: 24px;
  text-align: center;
}

/* Input */
.form-input {
  height: 36px;
  padding: 0 12px;
  border: 1px solid var(--el-border-color);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--el-text-color-primary);
  background: var(--el-bg-color);
  outline: none;
  width: 200px;
  transition: border-color .2s;
}
.form-input:focus { border-color: var(--c-primary); }

/* Form actions */
.form-actions {
  display: flex;
  gap: var(--space-4);
  justify-content: flex-end;
  padding-top: var(--space-5);
  border-top: 1px solid var(--el-border-color-lighter);
}
.btn {
  height: 40px;
  padding: 0 28px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s;
  white-space: nowrap;
}
.btn:hover { opacity: .85; }
.btn-primary { background: var(--c-primary); color: #fff; }
.btn-default { background: var(--el-fill-color); color: var(--el-text-color-regular); border: 1px solid var(--el-border-color); }
</style>
</head>
<body>

<button class="dark-toggle" onclick="document.documentElement.classList.toggle('dark')">Toggle Dark</button>

<div class="content-area">
  <div class="page-header">
    <div class="page-title">新建扫描</div>
  </div>

  <div class="form-card">
    <!-- Scan type -->
    <div class="form-section">
      <div class="section-title">扫描类型</div>
      <div class="form-row">
        <div class="radio-group">
          <label class="radio-item">
            <input type="radio" name="scan-type" value="full" checked>
            <span>全量扫描</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="scan-type" value="incremental">
            <span>增量扫描</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Scan scope -->
    <div class="form-section">
      <div class="section-title">扫描范围</div>
      <div class="form-row">
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" checked>
            <span>代码仓库</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox" checked>
            <span>数据库</span>
          </label>
          <label class="checkbox-item">
            <input type="checkbox">
            <span>文档</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Data source -->
    <div class="form-section">
      <div class="section-title">选择数据源</div>
      <div class="form-row">
        <div class="chip-area">
          <div class="chip selected" onclick="this.classList.toggle('selected')">
            <span class="chip-check">&#10003;</span>
            <span>backend-core</span>
          </div>
          <div class="chip selected" onclick="this.classList.toggle('selected')">
            <span class="chip-check">&#10003;</span>
            <span>payment-service</span>
          </div>
          <div class="chip" onclick="this.classList.toggle('selected')">
            <span class="chip-check"></span>
            <span>notification-service</span>
          </div>
          <div class="chip" onclick="this.classList.toggle('selected')">
            <span class="chip-check"></span>
            <span>shared-utils</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Scan options -->
    <div class="form-section">
      <div class="section-title">扫描选项</div>
      <div class="option-row">
        <span class="option-label">深度分析</span>
        <div class="toggle active" onclick="this.classList.toggle('active')"></div>
      </div>
      <div class="form-row">
        <div class="form-label">并行度</div>
        <div class="slider-group">
          <input type="range" min="1" max="8" value="4" oninput="this.nextElementSibling.textContent=this.value">
          <span class="slider-val">4</span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-label">超时时间（分钟）</div>
        <input class="form-input" type="number" value="30" min="1">
      </div>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button class="btn btn-default">取消</button>
      <button class="btn btn-primary">开始扫描</button>
    </div>
  </div>
</div>

<script>
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', function() {
    const check = this.querySelector('.chip-check');
    if (this.classList.contains('selected')) {
      check.innerHTML = '&#10003;';
    } else {
      check.innerHTML = '';
    }
  });
});
</script>

</body>
</html>
