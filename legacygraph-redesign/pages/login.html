<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegacyGraph - 登录</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root {
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --c-primary: #6366F1; --c-primary-light: #9293F4; --c-primary-bg: #EFF0FE; --c-primary-dark: #4F52C1;
  --gradient-brand: linear-gradient(135deg, #6366F1, #8B5CF6, #A78BFA);
  --el-text-color-primary: #1D1D1F; --el-text-color-secondary: #6E6E73; --el-text-color-placeholder: #A1A1A6;
  --el-border-color-lighter: #EDEDF0; --el-fill-color: #F5F5F7;
  --el-bg-color: #ffffff; --el-bg-color-overlay: #ffffff;
  --radius-md: 8px; --radius-lg: 12px;
  --card-bg: rgba(255, 255, 255, 0.92);
  --input-bg: #ffffff;
  --footer-text: var(--el-text-color-placeholder);
  --shadow-card: 0 20px 60px rgba(99, 102, 241, 0.15), 0 8px 24px rgba(0, 0, 0, 0.08);
}
html.dark {
  --c-primary: #818CF8; --c-primary-bg: #0D0E19;
  --gradient-brand: linear-gradient(135deg, #818CF8, #A78BFA, #C4B5FD);
  --el-text-color-primary: #F5F5F7; --el-text-color-secondary: #8E8E93; --el-text-color-placeholder: #636366;
  --el-border-color-lighter: #2C2C2E; --el-fill-color: #2C2C2E;
  --el-bg-color: #1C1C1E; --el-bg-color-overlay: #2C2C2E;
  --card-bg: rgba(28, 28, 30, 0.92);
  --input-bg: rgba(44, 44, 46, 0.6);
  --footer-text: var(--el-text-color-placeholder);
  --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.2);
}
html {
  font-family: var(--font-body);
  color: var(--el-text-color-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Full-screen gradient background */
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--gradient-brand);
  position: relative;
  overflow: hidden;
}

/* Floating geometric shapes */
.floating-shapes {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.shape {
  position: absolute;
  opacity: 0.12;
  fill: #ffffff;
}
html.dark .shape {
  opacity: 0.06;
}
.shape--circle {
  border-radius: 50%;
}
.shape--triangle {
  width: 0; height: 0;
  border: none;
  background: none;
  border-left: 30px solid transparent;
  border-right: 30px solid transparent;
  border-bottom: 52px solid rgba(255, 255, 255, 0.12);
  fill: none;
}
html.dark .shape--triangle {
  border-bottom-color: rgba(255, 255, 255, 0.06);
}

/* Individual floating shapes */
.shape-1 {
  width: 80px; height: 80px;
  top: 8%; left: 12%;
  animation: float-1 18s ease-in-out infinite;
}
.shape-2 {
  width: 0; height: 0;
  top: 15%; right: 18%;
  animation: float-2 22s ease-in-out infinite;
}
.shape-3 {
  width: 120px; height: 120px;
  bottom: 20%; left: 8%;
  animation: float-3 20s ease-in-out infinite;
}
.shape-4 {
  width: 60px; height: 60px;
  top: 55%; right: 10%;
  animation: float-1 24s ease-in-out infinite reverse;
}
.shape-5 {
  width: 0; height: 0;
  bottom: 10%; right: 25%;
  animation: float-2 16s ease-in-out infinite reverse;
}
.shape-6 {
  width: 100px; height: 100px;
  top: 35%; left: 5%;
  animation: float-3 26s ease-in-out infinite;
}
.shape-7 {
  width: 40px; height: 40px;
  top: 70%; left: 70%;
  animation: float-1 19s ease-in-out infinite;
}
.shape-8 {
  width: 0; height: 0;
  top: 10%; left: 55%;
  animation: float-2 21s ease-in-out infinite;
}
.shape-9 {
  width: 70px; height: 70px;
  bottom: 35%; left: 25%;
  animation: float-3 17s ease-in-out infinite reverse;
}
.shape-10 {
  width: 50px; height: 50px;
  top: 45%; right: 5%;
  animation: float-1 23s ease-in-out infinite;
}

/* Hexagon shapes via SVG */
.shape--hexagon {
  width: auto; height: auto;
}

@keyframes float-1 {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  25% { transform: translate(30px, -40px) rotate(15deg); }
  50% { transform: translate(-20px, 20px) rotate(-10deg); }
  75% { transform: translate(40px, 30px) rotate(5deg); }
}
@keyframes float-2 {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  25% { transform: translate(-25px, 35px) rotate(-20deg); }
  50% { transform: translate(35px, -15px) rotate(10deg); }
  75% { transform: translate(-15px, -30px) rotate(-5deg); }
}
@keyframes float-3 {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(20px, -25px) rotate(12deg); }
  66% { transform: translate(-30px, 15px) rotate(-8deg); }
}

/* Dark mode toggle */
.dark-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 100;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s ease, border-color 0.3s ease;
}
.dark-toggle:hover {
  background: rgba(255, 255, 255, 0.25);
  border-color: rgba(255, 255, 255, 0.5);
}
.dark-toggle svg {
  color: #fff;
  width: 20px;
  height: 20px;
}
.dark-toggle .icon-sun { display: none; }
.dark-toggle .icon-moon { display: block; }
html.dark .dark-toggle {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.15);
}
html.dark .dark-toggle:hover {
  background: rgba(255, 255, 255, 0.2);
}
html.dark .dark-toggle .icon-sun { display: block; }
html.dark .dark-toggle .icon-moon { display: none; }

/* Login card */
.login-card {
  width: 420px;
  max-width: 92vw;
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 40px 36px;
  position: relative;
  z-index: 10;
}

/* Logo area */
.logo-area {
  text-align: center;
  margin-bottom: 32px;
}
.logo-area svg {
  width: 48px;
  height: 48px;
  margin-bottom: 12px;
}
.logo-text {
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 18px;
  color: var(--el-text-color-primary);
}
.logo-subtitle {
  font-size: 13px;
  color: var(--el-text-color-secondary);
  margin-top: 6px;
  letter-spacing: 0.02em;
}

/* Form */
.login-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.input-group {
  position: relative;
  display: flex;
  align-items: center;
}
.input-group .input-icon {
  position: absolute;
  left: 14px;
  width: 16px;
  height: 16px;
  color: var(--el-text-color-placeholder);
  pointer-events: none;
  transition: color 0.2s ease;
  z-index: 1;
}
.input-group input {
  width: 100%;
  height: 44px;
  border-radius: var(--radius-md);
  border: 1px solid var(--el-border-color-lighter);
  background: var(--input-bg);
  padding: 0 14px 0 42px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--el-text-color-primary);
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.input-group input::placeholder {
  color: var(--el-text-color-placeholder);
}
.input-group input:focus {
  border-color: var(--c-primary);
  box-shadow: 0 0 0 3px var(--c-primary-bg);
}
.input-group input:focus ~ .input-icon,
.input-group input:focus + .input-icon {
  color: var(--c-primary);
}

/* Options row */
.form-options {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}
.checkbox-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.checkbox-wrap input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--c-primary);
  cursor: pointer;
}
.checkbox-wrap label {
  font-size: 13px;
  color: var(--el-text-color-secondary);
  cursor: pointer;
}
.forgot-link {
  font-size: 13px;
  color: var(--c-primary);
  text-decoration: none;
  transition: color 0.2s ease;
}
.forgot-link:hover {
  color: var(--c-primary-light);
  text-decoration: underline;
}

/* Login button */
.login-btn {
  width: 100%;
  height: 44px;
  border: none;
  border-radius: var(--radius-md);
  background: var(--gradient-brand);
  color: #ffffff;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: filter 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  letter-spacing: 0.02em;
}
.login-btn:hover {
  filter: brightness(1.08);
  box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
}
.login-btn:active {
  transform: scale(0.985);
}

/* Language toggle */
.lang-toggle {
  text-align: center;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--el-border-color-lighter);
}
.lang-toggle span {
  font-size: 12px;
  color: var(--el-text-color-placeholder);
}
.lang-toggle a {
  font-size: 12px;
  color: var(--el-text-color-secondary);
  text-decoration: none;
  padding: 0 4px;
  transition: color 0.2s ease;
  cursor: pointer;
}
.lang-toggle a:hover {
  color: var(--c-primary);
}
.lang-toggle a.active {
  color: var(--c-primary);
  font-weight: 600;
}

/* Footer */
.page-footer {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: var(--footer-text);
  z-index: 10;
  white-space: nowrap;
  opacity: 0.7;
}
html.dark .page-footer {
  color: rgba(99, 102, 241, 0.5);
}
</style>
</head>
<body>

<!-- Floating background shapes -->
<div class="floating-shapes">
  <!-- Circle 1 -->
  <div class="shape shape--circle shape-1"></div>
  <!-- Triangle 1 -->
  <div class="shape shape--triangle shape-2"></div>
  <!-- Circle 2 -->
  <div class="shape shape--circle shape-3"></div>
  <!-- Circle 3 -->
  <div class="shape shape--circle shape-4"></div>
  <!-- Triangle 2 -->
  <div class="shape shape--triangle shape-5"></div>
  <!-- Circle 4 -->
  <div class="shape shape--circle shape-6"></div>
  <!-- Circle 5 -->
  <div class="shape shape--circle shape-7"></div>
  <!-- Triangle 3 -->
  <div class="shape shape--triangle shape-8"></div>
  <!-- Circle 6 -->
  <div class="shape shape--circle shape-9"></div>
  <!-- Circle 7 -->
  <div class="shape shape--circle shape-10"></div>
  <!-- Hexagon 1 -->
  <svg class="shape shape--hexagon" style="position:absolute;top:5%;left:40%;width:70px;height:70px;animation:float-2 20s ease-in-out infinite;" viewBox="0 0 100 100">
    <polygon points="50,3 93,25 93,75 50,97 7,75 7,25" fill="rgba(255,255,255,0.12)"/>
  </svg>
  <!-- Hexagon 2 -->
  <svg class="shape shape--hexagon" style="position:absolute;bottom:30%;right:15%;width:50px;height:50px;animation:float-3 18s ease-in-out infinite reverse;" viewBox="0 0 100 100">
    <polygon points="50,3 93,25 93,75 50,97 7,75 7,25" fill="rgba(255,255,255,0.12)"/>
  </svg>
  <!-- Hexagon 3 -->
  <svg class="shape shape--hexagon" style="position:absolute;top:60%;left:50%;width:60px;height:60px;animation:float-1 22s ease-in-out infinite;" viewBox="0 0 100 100">
    <polygon points="50,3 93,25 93,75 50,97 7,75 7,25" fill="rgba(255,255,255,0.12)"/>
  </svg>
</div>

<!-- Dark mode toggle -->
<button class="dark-toggle" onclick="document.documentElement.classList.toggle('dark')" aria-label="切换深色模式">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
</button>

<!-- Login card -->
<div class="login-card">
  <!-- Logo -->
  <div class="logo-area">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Hexagon outline -->
      <path d="M24 4L42 14V34L24 44L6 34V14L24 4Z" stroke="var(--c-primary)" stroke-width="1.8" fill="none" opacity="0.3"/>
      <!-- Connection lines -->
      <line x1="24" y1="16" x2="14" y2="30" stroke="var(--c-primary)" stroke-width="1.5" opacity="0.6"/>
      <line x1="24" y1="16" x2="34" y2="30" stroke="var(--c-primary)" stroke-width="1.5" opacity="0.6"/>
      <line x1="14" y1="30" x2="34" y2="30" stroke="var(--c-primary)" stroke-width="1.5" opacity="0.6"/>
      <!-- Node 1 - top -->
      <circle cx="24" cy="16" r="4" fill="var(--c-primary)"/>
      <circle cx="24" cy="16" r="2" fill="#ffffff"/>
      <!-- Node 2 - bottom left -->
      <circle cx="14" cy="30" r="4" fill="var(--c-primary)"/>
      <circle cx="14" cy="30" r="2" fill="#ffffff"/>
      <!-- Node 3 - bottom right -->
      <circle cx="34" cy="30" r="4" fill="var(--c-primary)"/>
      <circle cx="34" cy="30" r="2" fill="#ffffff"/>
    </svg>
    <div class="logo-text">LegacyGraph</div>
    <div class="logo-subtitle">AI 驱动的知识图谱理解平台</div>
  </div>

  <!-- Form -->
  <form class="login-form" onsubmit="return false;">
    <div class="input-group">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <input type="text" placeholder="请输入用户名" autocomplete="username"/>
    </div>
    <div class="input-group">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="password" placeholder="请输入密码" autocomplete="current-password"/>
    </div>
    <div class="form-options">
      <div class="checkbox-wrap">
        <input type="checkbox" id="remember"/>
        <label for="remember">记住我</label>
      </div>
      <a href="#" class="forgot-link">忘记密码?</a>
    </div>
    <button type="submit" class="login-btn">登 录</button>
  </form>

  <!-- Language toggle -->
  <div class="lang-toggle">
    <span>Language:</span>
    <a href="#" class="active">中文</a>
    <span>|</span>
    <a href="#">EN</a>
  </div>
</div>

<!-- Footer -->
<div class="page-footer">&copy; 2024 LegacyGraph. All rights reserved.</div>

</body>
</html>
