# ============================================
# 测试环境配置
# ============================================

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: legacy-graph-api-test

  # 数据源 - 使用与主配置相同的 PostgreSQL
  datasource:
    url: jdbc:postgresql://118.145.225.100:5432/legacy_graph
    username: mumuai
    password: Liucl157
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      pool-name: LegacyGraphTestHikariCP

  # Redis - 禁用
  data:
    redis:
      host: localhost
      port: 6379
    # 禁用 Redis 自动配置（通过 exclude 在 test class 中处理）

  # Neo4j - 使用占位值（Driver 不会立即连接）
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: password

  # Spring AI - 禁用
  ai:
    openai:
      api-key: test-key-placeholder
      base-url: http://localhost:18080/v1
      chat:
        options:
          model: test
          temperature: 0.1
      embedding:
        options:
          model: test
          dimensions: 768

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      writeDatesAsTimestamps: false
    default-property-inclusion: non_null

  # 禁用不需要的自动配置
  autoconfigure:
    exclude:
      # Redis
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      # JPA（项目未使用 JPA 实体）
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      # Spring AI OpenAI
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      # Spring AI PgVector
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      # Spring AI Retry
      - org.springframework.ai.retry.autoconfigure.SpringAiRetryAutoConfiguration

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: io.github.legacygraph.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: ASSIGN_UUID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# MinIO - 使用占位值
minio:
  endpoint: http://localhost:9000
  access-key: minio
  secret-key: minio123456
  bucket-name: test-bucket

# JWT
jwt:
  secret: test-secret-key-for-jwt-token-authentication-2026
  expiration: 86400000

# 日志
logging:
  level:
    io.github.legacygraph: debug
    org.springframework.security: warn
