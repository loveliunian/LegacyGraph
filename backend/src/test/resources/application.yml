# ============================================
# 测试环境配置 - H2 内存数据库
# ============================================

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: legacy-graph-api-test

  profiles:
    active: test

  # 数据源 - H2 内存数据库
  datasource:
    url: jdbc:h2:mem:legacy_graph;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      pool-name: LegacyGraphTestHikariCP
  sql:
    init:
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
      mode: always

  # H2 Console（调试用）
  h2:
    console:
      enabled: true
      path: /h2-console

  # Flyway - 禁用（测试用 schema-h2.sql 初始化）
  flyway:
    enabled: false

  # Redis - 禁用
  data:
    redis:
      host: localhost
      port: 6379

  # Neo4j - 使用占位值
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: password

  # Spring AI - 禁用
  ai:
    openai:
      api-key: test-key-placeholder
      base-url: http://localhost:18080/v1
      chat:
        options:
          model: test
          temperature: 0.1
      embedding:
        options:
          model: test
          dimensions: 768

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # 禁用不需要的自动配置
  autoconfigure:
    exclude:
      # Redis
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      # JPA（项目未使用 JPA 实体）
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      # Flyway（测试用 schema-h2.sql 初始化，不需要 Flyway 迁移）
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      # Neo4j
      - org.springframework.boot.autoconfigure.data.neo4j.Neo4jDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.neo4j.Neo4jReactiveDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.neo4j.Neo4jReactiveRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.neo4j.Neo4jRepositoriesAutoConfiguration
      # Spring AI OpenAI（全部由 H2TestConfig mock 提供）
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      # Spring AI PgVector（保留自动配置）
      # - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      # Spring AI Retry
      - org.springframework.ai.retry.autoconfigure.SpringAiRetryAutoConfiguration

# MyBatis-Plus
mybatis-plus:
  type-aliases-package: io.github.legacygraph.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: ASSIGN_UUID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# MinIO - 不使用
minio:
  endpoint: http://localhost:9000
  access-key: test
  secret-key: test123456
  bucket-name: test-bucket

# JWT
jwt:
  secret: test-secret-key-for-jwt-token-authentication-2026
  expiration: 86400000

# 日志
logging:
  level:
    io.github.legacygraph: debug
    org.springframework.security: warn
