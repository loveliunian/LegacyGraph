# =============================================================================
# JVM 启动参数建议（生产环境）
# =============================================================================
# 基础堆内存（根据实际负载调整）:
#   -Xms2g -Xmx4g
#
# GC 选择（Java 21+ 推荐 ZGC，低延迟 < 1ms 暂停）:
#   -XX:+UseZGC -XX:MaxGCPauseMillis=50
#
# 备选（Java 17 兼容）:
#   -XX:+UseG1GC -XX:MaxGCPauseMillis=100
#
# GC 日志（排查 GC 问题用）:
#   -Xlog:gc*:file=logs/gc.log:time,level,tags:filecount=10,filesize=50M
#
# 大图构建场景（对象分配密集，建议）:
#   -XX:+AlwaysPreTouch          # 启动时预触碰堆页，避免运行时缺页
#   -XX:+UseStringDeduplication  # G1/ZGC 下启用字符串去重，减少内存
#
# Docker / K8s 环境:
#   -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
#
# 完整示例（Java 21 + ZGC）:
#   java -Xms2g -Xmx4g -XX:+UseZGC -XX:MaxGCPauseMillis=50 \
#        -XX:+AlwaysPreTouch -XX:+UseContainerSupport \
#        -XX:MaxRAMPercentage=75.0 \
#        -jar legacygraph-api.jar
# =============================================================================

server:
  port: 8080
  servlet:
    context-path: /api
    engine: jetty
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

spring:
  profiles:
    active: dev
  application:
    name: legacy-graph-api
  main:
    # 延迟加载非 Web Bean，减少启动时间；Controller 首次请求时初始化
    lazy-initialization: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # 数据源配置（生产环境必须通过环境变量注入）
  datasource:
    url: ${POSTGRES_URL:}
    username: ${POSTGRES_USERNAME:}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 30
      idle-timeout: 30000
      pool-name: LegacyGraphHikariCP
      max-lifetime: 600000
      connection-timeout: 10000
      leak-detection-threshold: 600000
      data-source-properties:
        stringtype: unspecified
        reWriteBatchedInserts: true

  # Flyway 数据库迁移配置（Spring Boot 4.x 移除自动配置，手动 FlywayConfig 管理）
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    clean-disabled: true
    # 生产关闭校验：45+ migrations checksum 扫描需 3-5s，已在 CI/开发阶段校验
    validate-on-migrate: false
    out-of-order: true
    placeholder-replacement: false

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:11}
      lettuce:
        pool:
          max-active: 16
          max-wait: 2000ms
          max-idle: 8
          min-idle: 4
      timeout: 5000ms
      connect-timeout: 3000ms

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # 禁用未使用的自动配置（项目用 MyBatis-Plus，不需要 JPA/Hibernate）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

  # Neo4j 配置
  neo4j:
    uri: ${NEO4J_URI:}
    authentication:
      username: ${NEO4J_USERNAME:}
      password: ${NEO4J_PASSWORD:}
    pool:
      max-connection-pool-size: 50
      connection-acquisition-timeout: 30000
      max-connection-lifetime: 3600s

  # Spring AI OpenAI 配置（兼容 DeepSeek）
  # api-key 从数据库 lg_llm_provider 表读取，此处仅做占位
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com/v1
      chat:
        options:
          model: deepseek-chat
          temperature: 0.1
      embedding:
        options:
          model: text-embedding-3-small
          dimensions: 768

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: io.github.legacygraph.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: ASSIGN_UUID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 启用自动建表：表不存在时自动创建（仅开发环境）
      auto-create-table: false

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:}
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}
  bucket-name: legacy-graph

# JWT 配置
jwt:
  secret: ${JWT_SECRET:legacygraph-dev-secret-key-2024-very-long-for-jwt-hmac}
  expiration: 86400000

# 日志配置已由 logback-spring.xml 接管
# 开发环境(dev): 控制台 DEBUG 输出
# 生产环境(prod): 文件输出 + 按天分割 + gz 压缩 + 30天保留

# Actuator 端点收口
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    defaults:
      enabled: false
    db:
      enabled: true

# OpenAPI/Swagger 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# LegacyGraph 自定义配置
legacygraph:
  # L-01: 密码加解密主密钥（Base64 编码的 32 字节 AES-256 密钥）
  # 生产环境必须配置！未配置时自动生成临时密钥（重启后旧密文不可解密）
  # 生成方式：openssl rand -base64 32
  secret:
    master-key: ""
  # L-16: API 调用链 BFS 最大深度（默认 12，上限 12）
  graph:
    api-chain:
      max-depth: 12
    # 写图模式：direct(直接写图) / shadow(双轨对比) / claim-compiler(Claim编译写图)
    write-mode: direct
  document:
    partition:
      # Feature Flag：结构感知切块开关（spec 5.4）
      # 开启时使用 DocumentPartitionService + StructureAwareChunkService 进行结构感知切块
      # 关闭时走旧 DocumentContentService + vectorizeContent 路径
      enabled: true
      # 每块最大字符数（默认 2500，不含 headingPath 前缀）
      max-chars: 2500
      # G13: 三层文档解析默认开（FAST/LAYOUT 无条件开，OCR 对扫描件 PDF 才开）
      # three-layer.enabled=false 时全部走 FAST（一键回退开关）
      three-layer:
        enabled: true
        fast-mime: text/markdown,text/plain,text/x-markdown
        layout-mime: application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document
        ocr-fallback: false  # OCR 默认仍关，扫描件 PDF 才开
  understanding:
    scan-enhancement:
      enabled: true
      max-targets: 20
    tools:
      local-fallback:
        enabled: true
        kind: LOCAL
      codebase-memory-mcp:
        enabled: true
        kind: MCP
      codex:
        enabled: true
        kind: CLI
        path: codex
        timeout-seconds: 120
        max-output-bytes: 100000
      claude-code:
        enabled: true
        kind: CLI
        path: claude
        timeout-seconds: 120
        max-output-bytes: 100000
      zread:
        enabled: true
        kind: CLI
        path: zread
      repomix:
        enabled: false
        kind: CLI
        path: repomix
  graphify:
    # Graphify CLI 自动导入开关。默认 false：当前未确认 graphify CLI 已安装。
    # 设为 true 前，请确保 graphify 可执行文件可用（executable 配置路径或在 PATH 中）。
    # 开启后扫描流程会自动调用 GraphifyRunner 生成 graphify-out 并导入 Neo4j，
    # ScanFinalizationService 发布时会计算 GraphifyQualityResult 写入 GraphRelease.metrics。
    enabled: false
    executable: graphify
    timeout-seconds: 900
    max-output-bytes: 500000
    output-dir-name: graphify-out
    keep-temp-files: false
    work-dir-whitelist: []
    extra-args:
      - --no-viz
      - --timing
  # 图谱发布门禁开关 — 开启后 QA 在版本未通过质量门禁时拒答（DRAFT/VALIDATING/FAILED）
  graph-release:
    enabled: true
  # G5 跨语言实体消解 embedding 增强 Feature Flag
  # 开启时对前端 Feature 与文档 Feature 名称分别生成 embedding，余弦相似度 > 0.78 创建 POSSIBLE_SAME_AS 边
  # 关闭时退化为名称匹配（TerminologyService 跨语言相似度，阈值 0.6）
  cross-language:
    embedding:
      enabled: false
  # Task 8.3：向量检索 GraphRelease + ACL 过滤开关
  # 开启后向量检索按 graphReleaseId / aclPrincipal 过滤，与关键词检索行为一致
  qa:
    graph-release-filter:
      enabled: true
    # P0-1: RRF 混合检索默认开启
    # 开启后多路召回结果通过 ReciprocalRankFusion 融合排序，提升 mAP@10
    rrf-enabled: true
    # P0-2: EvidenceVerifier NLI 评分试点
    evidence-verifier:
      mode: BOTH   # REGEX_ONLY | NLI_ONLY | BOTH
      nli:
        enabled: false  # NLI 服务未部署前保持 false，走正则兜底
        endpoint: http://internal-hhem:8080/score
        timeout-ms: 800
        min-score: 0.55
  # P0-3: 外部验证服务（OpenAPI 对比等）
  # 默认关闭，开启后在 MEMBER_CALL_RESOLVE 与 DATABASE_SCAN 之间执行 EXTERNAL_VERIFY
  external-verification:
    enabled: false
    timeout-seconds: 60
    openapi:
      enabled: true
      tools: [spectral, oasdiff]
  # P3-1: 图谱质量门禁配置（ScanFinalizationService 已集成）
  scan:
    # H11: 从 legacy-graph.scan 合并 + 新增缺失配置
    max-concurrent-files: 10
    max-file-size-mb: 100
    max-files: 50000
    max-docs: 5000
    adapter-concurrency: 16
    # 强制全量扫描：禁用增量，确保 AI_FEATURE_MAPPING/AI_DOC_EXTRACT 等不被增量跳过
    incremental:
      enabled: false
    quality-gate:
      enabled: true
      thresholds:
        min-edge-node-ratio: 1.0
        max-isolated-rate: 0.10
        min-evidence-coverage: 0.95
  # P3-2: Ragas Python 子进程评估（需安装 ragas + openai）
  evaluation:
    ragas:
      python-enabled: false  # 默认关闭，CI 中有 OPENAI_API_KEY 时开启
      python-executable: python3
      script-path: scripts/ragas_evaluate.py
      timeout-seconds: 120
      llm-model: gpt-4o-mini

  # H11: 以下配置原属于 legacy-graph.* 命名空间，现统一为 legacygraph.*
  # 测试配置
  test:
    allow-production-test: false
    execution-timeout: 300
    base-url:
      dev: http://localhost:8080
      test: http://localhost:8080
      prod: http://localhost:8080
    gate-result-timeout-ms: 300000
    gate-result-poll-ms: 1000
  # AI 配置
  ai:
    enable-default: true
    auto-generate-test-case-default: false
    min-confidence-default: 0.6
    llm-timeout: 120
  # Agent 合并决策配置
  agent:
    merge:
      name-weight: 0.8
      semantic-weight: 0.7
      struct-weight: 0.6
      neighbor-weight: 0.5
      evidence-weight: 0.7
      score-name-weight: 0.35
      score-semantic-weight: 0.0
      score-struct-weight: 0.25
      score-evidence-weight: 0.20
      score-runtime-weight: 0.10
      score-history-weight: 0.10
      auto-merge-threshold: 0.85
      review-threshold: 0.50
      # 改进④：类型感知评分权重（业务域类型语义优先，API/Table 结构优先）
      score-weights-by-type:
        BusinessDomain:   {name: 0.15, semantic: 0.45, struct: 0.10, evidence: 0.20, runtime: 0.05, history: 0.05}
        BusinessProcess:  {name: 0.20, semantic: 0.40, struct: 0.15, evidence: 0.15, runtime: 0.05, history: 0.05}
        BusinessObject:   {name: 0.30, semantic: 0.30, struct: 0.20, evidence: 0.15, runtime: 0.05, history: 0.00}
        BusinessRule:     {name: 0.25, semantic: 0.35, struct: 0.15, evidence: 0.15, runtime: 0.05, history: 0.05}
        Role:             {name: 0.25, semantic: 0.35, struct: 0.15, evidence: 0.15, runtime: 0.05, history: 0.05}
        Feature:          {name: 0.40, semantic: 0.20, struct: 0.20, evidence: 0.15, runtime: 0.05, history: 0.00}
        ApiEndpoint:      {name: 0.20, semantic: 0.05, struct: 0.40, evidence: 0.25, runtime: 0.10, history: 0.00}
        Table:            {name: 0.30, semantic: 0.05, struct: 0.40, evidence: 0.20, runtime: 0.05, history: 0.00}
        default:          {name: 0.35, semantic: 0.00, struct: 0.25, evidence: 0.20, runtime: 0.10, history: 0.10}
      confidence-support-weight: 0.50
      confidence-semantic-weight: 0.15
      confidence-struct-weight: 0.15
      confidence-neighbor-weight: 0.10
      confidence-runtime-weight: 0.05
      confidence-human-weight: 0.05
      confidence-conflict-penalty: 0.35
  # CLI 工具适配器配置
  tool:
    cli:
      tool-name: codex
      command-template: codex exec --no-write --json "{query}"
      timeout-seconds: 180
      max-output-bytes: 200000
      work-dir-whitelist: []
  # H04: PM4Py 流程挖掘配置
  pm4py:
    python-path: python3
    script-path: scripts/pm4py_conformance.py
    timeout-seconds: 60
  # H11: 报告本地输出目录
  reports:
    local-dir: ${user.home}/.legacygraph/reports
  # H11: 健康检查默认项目 ID
  health:
    default-project-id: default
  # H11: 社区摘要（默认关闭）
  community:
    summary:
      enabled: false
  # H11: OCR 配置
  ocr:
    enabled: false

# 术语相似度阈值配置。
# 中文业务术语 → 英文子词的映射表已迁入数据库表 lg_terminology_mapping（见 ConfigurableTerminologyService），
# 以后新增术语直接入库即可，无需改配置重新部署。此处仅保留相似度阈值，便于按环境调优。
terminology:
  similarity:
    min-token-length: 4
    small-set-threshold: 3
    contains-similarity: 0.7
    exact-match-similarity: 0.9
    min-match-length: 3

