server:
  port: 8080
  servlet:
    context-path: /api
    engine: jetty

spring:
  application:
    name: legacy-graph-api

  # 数据源配置
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://118.145.225.100:5432/legacy_graph}
    username: ${POSTGRES_USERNAME:mumuai}
    password: ${POSTGRES_PASSWORD:Liucl157}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: LegacyGraphHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      data-source-properties:
        stringtype: unspecified

  # Flyway 数据库迁移配置（Spring Boot 4.x 移除自动配置，手动 FlywayConfig 管理）
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    clean-disabled: true
    validate-on-migrate: true
    placeholder-replacement: false

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:47.95.208.205}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:Liucl157}
      database: 11
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # 禁用未使用的自动配置（项目用 MyBatis-Plus，不需要 JPA/Hibernate）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

  # Neo4j 配置
  neo4j:
    uri: ${NEO4J_URI:bolt://118.145.225.100:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:Liucl157}

  # Spring AI OpenAI 配置（兼容 DeepSeek）
  # api-key 从数据库 lg_llm_provider 表读取，此处仅做占位
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:DEEPSEEK_API_KEY_REMOVED}
      base-url: https://api.deepseek.com/v1
      chat:
        options:
          model: deepseek-chat
          temperature: 0.1
      embedding:
        options:
          model: text-embedding-3-small
          dimensions: 768

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: io.github.legacygraph.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: ASSIGN_UUID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 启用自动建表：表不存在时自动创建（仅开发环境）
      auto-create-table: false

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://47.95.208.205:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:Liucl@157}
  bucket-name: legacy-graph

# JWT 配置
jwt:
  secret: legacy-graph-secret-key-for-jwt-token-authentication-2026
  expiration: 86400000

# 日志配置
logging:
  level:
    io.github.legacygraph: info
    org.springframework.security: warn

# OpenAPI/Swagger 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# LegacyGraph 自定义配置
legacy-graph:
  scan:
    # 并发扫描文件数
    max-concurrent-files: 10
    # 文件大小限制 (MB)
    max-file-size-mb: 100
  test:
    # 是否允许在生产环境执行测试
    allow-production-test: false
    # 测试执行超时时间 (秒)
    execution-timeout: 300
  ai:
    # LLM 超时时间 (秒)
    llm-timeout: 120
