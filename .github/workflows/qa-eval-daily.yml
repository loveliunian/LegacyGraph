name: QA Eval Daily (H28)

on:
  schedule:
    # 每日 UTC 18:00 = 北京时间 02:00
    - cron: '0 18 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  qa-eval-v2:
    runs-on: ubuntu-latest
    # H28: 每日跑 v2 评测集（100 题），回归 > 5% 报警
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/password
        ports:
          - 7687:7687
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: legacy_graph_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend (skip tests)
        working-directory: backend
        run: mvn -B clean package -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Start backend service
        working-directory: backend
        run: |
          java -jar target/*.jar --spring.profiles.active=test &
          echo $! > backend.pid
          # 等待服务就绪（最多 120s）
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/60)"
            sleep 2
          done
          curl -sf http://localhost:8080/actuator/health || (echo "Backend failed to start" && exit 1)
        env:
          SPRING_PROFILES_ACTIVE: test
          POSTGRES_URL: jdbc:postgresql://localhost:5432/legacy_graph_test
          POSTGRES_USERNAME: test
          POSTGRES_PASSWORD: test
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-eval-secret-key

      - name: Run v2 QA evaluation
        id: eval
        run: |
          PROJECT_ID="${{ secrets.QA_EVAL_PROJECT_ID || 'default' }}"
          VERSION_ID="${{ secrets.QA_EVAL_VERSION_ID || 'latest' }}"

          echo "Running v2 QA eval: projectId=$PROJECT_ID, versionId=$VERSION_ID"

          RESPONSE=$(curl -sf -X POST \
            "http://localhost:8080/lg/projects/$PROJECT_ID/qa/eval-v2/run?versionId=$VERSION_ID" \
            -H "Content-Type: application/json" \
            -o /tmp/eval-response.json \
            -w "%{http_code}")

          echo "HTTP status: $RESPONSE"

          if [ "$RESPONSE" != "200" ]; then
            echo "::warning::QA eval API returned non-200: $RESPONSE"
            cat /tmp/eval-response.json
            exit 1
          fi

          # 检查回归
          REGRESSION=$(python3 -c "
          import json
          with open('/tmp/eval-response.json') as f:
              data = json.load(f)
          result = data.get('data', {})
          regression = result.get('regressionDetected', False)
          metrics = result.get('categoryMetrics', {})
          print(f'regressionDetected: {regression}')
          for cat, m in metrics.items():
              acc = m.get('accuracy', 0)
              baseline = m.get('baselineTarget', 0)
              status = '✓' if m.get('meetsBaseline') else '✗'
              print(f'  {cat}: {acc:.1%} (baseline {baseline:.1%}) {status}')
          print(f'regression={regression}')
          " 2>&1)

          echo "$REGRESSION"

          if echo "$REGRESSION" | grep -q "regression=True"; then
            echo "::warning::QA regression detected (>5% below baseline)"
            # 不 exit 1，仅 warning，避免阻塞
          fi

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-eval-v2-result
          path: /tmp/eval-response.json
          retention-days: 30

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend/backend.pid ]; then
            kill $(cat backend/backend.pid) || true
          fi
