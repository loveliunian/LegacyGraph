name: Java CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/password
        ports:
          - 7687:7687
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: legacy_graph_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        working-directory: backend
        run: mvn -B clean test
        env:
          SPRING_PROFILES_ACTIVE: test
          POSTGRES_URL: jdbc:postgresql://localhost:5432/legacy_graph_test
          POSTGRES_USERNAME: test
          POSTGRES_PASSWORD: test
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret-key

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Unit tests
        working-directory: frontend
        run: npm test -- --run

  ragas-evaluation:
    runs-on: ubuntu-latest
    needs: backend-test
    # P3-2: Ragas RAG 质量评估 — 仅在 main 分支 push 时运行
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ragas dependencies
        run: |
          pip install ragas datasets
          pip install openai

      - name: Run ragas evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # 如果没有 OPENAI_API_KEY，使用 Java 简化版指标，跳过 Python ragas
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY not set, skipping ragas evaluation"
            echo '{"skipped": true, "reason": "no OPENAI_API_KEY"}' > ragas-result.json
          else
            # 从 SMOKE 测试用例导出 JSONL
            # 实际运行需要后端服务已启动，此处仅验证脚本可执行
            echo '{"question":"test","answer":"test","contexts":["test"]}' > /tmp/test-cases.jsonl
            python3 scripts/ragas_evaluate.py \
              --dataset /tmp/test-cases.jsonl \
              --metrics context_precision,context_recall,faithfulness,answer_relevancy \
              --llm-model gpt-4o-mini || echo '{"error": "ragas evaluation failed"}' > ragas-result.json
          fi

      - name: Upload ragas results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ragas-evaluation-result
          path: ragas-result.json
          retention-days: 30
